# Runtime pins for tools mise manages on Zeta.
#
# Round 34 late-round flip: .NET SDK moved onto mise. The
# round-32 rationale for keeping dotnet out of mise (shared
# `dotnet-root/` layout fighting the in-process PATH story)
# was resolved upstream — Aaron landed the fix in the mise
# dotnet plugin itself; homebrew-mise was stale, not the
# plugin. `../scratch` ships with this shape green. `global.json`
# stays as the .NET-native pin contract; mise reads the
# declared version here and installs it via the plugin.
#
# Lean stays outside mise until a mise plugin exists (candidate
# OSS contribution target per GOVERNANCE.md §23) — installed via
# `tools/setup/common/elan.sh`.
#
# Consumed by `tools/setup/common/mise.sh` which runs
# `mise install` from this directory. See
# `docs/research/build-machine-setup.md` for the full rationale.

[tools]
# .NET 10 SDK (latest). Kept in sync with `global.json` — Zeta's
# own `.NET`-native pin contract. Round-34 flip from
# Microsoft's dotnet-install.sh to mise (see header).
dotnet = "10.0.203"
python = "3.14"
# Java 26 (latest). Round-34 migration: OpenJDK moved off brew
# and onto mise so all language runtimes share one manager.
java = "26"
# Bun pinned. Round-34 seeding for the post-install repo-
# automation runtime research (BACKLOG P1 "Post-install repo
# automation: runtime choice open") + future web/UI work.
# Matches `../scratch`'s install shape.
bun = "1.3"
# uv pinned (round-34 pull-in from ../scratch). Manages Python
# CLI tooling (ruff etc.) via `uv tool install` with
# reproducible versions across laptops + CI. See BACKLOG
# "Python tool management via uv tool (from ../scratch)". Also
# powers mise's `pipx:` backend below (mise auto-routes `pipx:`
# tools through `uv tool install` when uv is available — no
# pipx package needed, faster + already in our toolchain).
uv = "0.11.8"
# actionlint: GitHub Actions workflow linter. Declarative install
# (GOVERNANCE §24 three-way-parity) so dev laptops + CI runners
# (including ubuntu-slim which doesn't ship with it) have identical
# pinned versions. Replaces the prior inline `Download actionlint`
# step in gate.yml.
actionlint = "1.7.12"
# shellcheck: bash-script linter. Same parity rationale — ubuntu-
# slim + ubuntu-24.04-arm runners don't ship shellcheck pre-
# installed, so declarative pin here ensures dev/CI parity.
shellcheck = "0.11.0"
# Node + npm: required for the npm-backed mise tools below.
# Mise's `npm:` backend installs via `npm install -g`, so the
# Node runtime must be installed first. Pinned here so dev
# laptops + CI runners + devcontainers all get the same Node
# version through the install script — no separate
# actions/setup-node step in gate.yml. 22 LTS as of 2026-04.
node = "22"
# markdownlint-cli2: markdown linter. Declarative pin per the
# human maintainer's "update declaratively everywhere" directive
# (2026-04-24). Moves the version off a hardcoded
# `.github/workflows/gate.yml` line and into the single source
# of truth the rest of the toolchain already uses. Kept in sync
# with `package.json` devDependency (used by the `lint:markdown`
# script in package.json) so dev laptops can also `bun run
# lint:markdown`. Both pins point at the same version.
"npm:markdownlint-cli2" = "0.22.1"
# semgrep: SAST linter (the 14 rules in `.semgrep.yml`). Pinned
# here per the three-way-parity invariant (GOVERNANCE §24) — dev
# laptops + CI runners + devcontainers should all install
# semgrep through the same `tools/setup/install.sh` rather than
# CI fetching its own copy via `actions/setup-python` + pip.
# The `pipx:` backend prefix is mise's naming; the actual
# installer mise uses is `uv tool install` (since `uv` above is
# in this toolchain — mise auto-routes pipx: through uv when
# uv is available; faster than real pipx, no separate package
# needed). See docs/DECISIONS/2026-04-27-uv-canonical-python-
# tool-manager.md for the uv-as-canonical decision and lineage
# from ../scratch. Resolves Scorecard PinnedDependenciesID #17
# + #18 (pip install --upgrade pip + pip install semgrep — the
# unpinned pip-bootstrap surface goes away entirely once mise
# owns this tool).
"pipx:semgrep" = "1.161.0"

[settings]
# `python-build-standalone` (upstream for mise's python plugin)
# gates downloads on GitHub artifact attestations. On CI the
# unauthenticated GitHub API rate-limits the shared runner IP;
# scratch + SQLSharp both disable this check. Round-32 v1.0
# security scope treats python-attestation on CI as a post-v1
# hardening item (`SECURITY-BACKLOG.md`).
python.github_attestations = false
# Auto-activate uv-created venvs when mise enters a directory.
# QoL: `uv run` / venv switching seamless. From ../scratch.
python.uv_venv_auto = "source"
