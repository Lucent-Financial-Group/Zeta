<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Factory Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.25rem; color: #6366f1; }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .refresh-info { font-size: 0.75rem; color: #555; }
        h2 { font-size: 1.25rem; margin: 0 0 1rem; color: #8b5cf6; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .panel { background: #1a1a1a; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #333; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; }
        .stat { background: #2a2a2a; padding: 1rem; border-radius: 6px; text-align: center; }
        .stat-value { font-size: 1.75rem; font-weight: bold; color: #6366f1; }
        .stat-value.good { color: #10b981; }
        .stat-value.warn { color: #f59e0b; }
        .stat-value.bad { color: #ef4444; }
        .stat-label { font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
        .agent-list { list-style: none; }
        .agent-item { display: flex; align-items: center; padding: 0.5rem 0.75rem; margin-bottom: 0.25rem; background: #2a2a2a; border-radius: 6px; font-size: 0.9rem; }
        .agent-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 0.75rem; flex-shrink: 0; }
        .agent-dot.active { background: #10b981; }
        .agent-dot.recent { background: #f59e0b; }
        .agent-dot.stale { background: #ef4444; }
        .agent-name { font-weight: 500; min-width: 60px; }
        .agent-detail { font-size: 0.75rem; color: #888; margin-left: auto; text-align: right; }
        .pr-list { list-style: none; }
        .pr-item { padding: 0.5rem 0.75rem; margin-bottom: 0.25rem; background: #2a2a2a; border-radius: 6px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .pr-number { color: #6366f1; font-family: monospace; min-width: 45px; }
        .pr-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pr-status { font-size: 0.7rem; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
        .pr-status.open { background: #1a3a1a; color: #10b981; }
        .pr-status.merged { background: #2a1a3a; color: #8b5cf6; }
        .timeline { position: relative; padding-left: 1.5rem; max-height: 500px; overflow-y: auto; }
        .timeline::before { content: ''; position: absolute; left: 4px; top: 0; bottom: 0; width: 2px; background: #333; }
        .timeline-item { position: relative; padding: 0.5rem 0; }
        .timeline-item::before { content: ''; position: absolute; left: -1.5rem; top: 0.75rem; width: 10px; height: 10px; background: #6366f1; border-radius: 50%; border: 2px solid #1a1a1a; }
        .commit { background: #2a2a2a; padding: 0.75rem; border-radius: 6px; border-left: 3px solid #6366f1; }
        .commit-hash { font-family: monospace; color: #6366f1; font-size: 0.8rem; }
        .commit-message { font-size: 0.85rem; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .commit-meta { font-size: 0.7rem; color: #888; margin-top: 0.25rem; }
        .loading { text-align: center; padding: 1rem; color: #888; font-size: 0.85rem; }
        .error { text-align: center; padding: 1rem; color: #ef4444; background: #2a1a1a; border-radius: 8px; font-size: 0.85rem; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zeta Factory</h1>
        <p class="subtitle">Autonomous software factory — live from GitHub API
            <span class="refresh-info" id="refresh-info"></span>
        </p>

        <div class="panel">
            <h2>DORA Metrics (24h)</h2>
            <div class="stat-grid">
                <div class="stat">
                    <div class="stat-value" id="merge-velocity">-</div>
                    <div class="stat-label">PRs Merged</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="lead-time">-</div>
                    <div class="stat-label">Avg Lead Time</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="open-prs">-</div>
                    <div class="stat-label">Open PRs</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="last-merge">-</div>
                    <div class="stat-label">Last Merge</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="commits-24h">-</div>
                    <div class="stat-label">Commits (24h)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="active-agents">-</div>
                    <div class="stat-label">Active Agents</div>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <div class="panel">
                <h2>Agent Activity</h2>
                <ul class="agent-list" id="agent-list">
                    <li class="agent-item"><span class="agent-dot recent"></span><span class="agent-name">Loading...</span></li>
                </ul>
            </div>

            <div class="panel">
                <h2>PR Queue</h2>
                <ul class="pr-list" id="pr-list">
                    <li class="pr-item"><span class="pr-title">Loading...</span></li>
                </ul>
            </div>
        </div>

        <div class="panel">
            <h2>Recent Commits</h2>
            <div class="timeline" id="timeline">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'Lucent-Financial-Group';
        const REPO = 'Zeta';
        const API = `https://api.github.com/repos/${OWNER}/${REPO}`;

        const AGENT_MAP = {
            'Otto': { harness: 'Claude Code', patterns: ['Co-Authored-By: Claude'] },
            'Alexa': { harness: 'Kiro/Qwen', patterns: ['kiro', 'alexa', 'qwen'] },
            'Lior': { harness: 'Gemini', patterns: ['lior', 'gemini'] },
            'Vera': { harness: 'Codex', patterns: ['codex', 'vera'] },
            'Riven': { harness: 'Grok', patterns: ['riven', 'grok'] },
            'Aaron': { harness: 'Human', patterns: ['Aaron Stainback', 'AceHack'] }
        };

        async function apiFetch(url) {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
            return resp.json();
        }

        function timeAgo(date) {
            const mins = Math.floor((Date.now() - new Date(date)) / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return `${hrs}h ago`;
            return `${Math.floor(hrs / 24)}d ago`;
        }

        function detectAgent(commit) {
            const msg = commit.commit.message;
            const author = commit.commit.author.name;
            for (const [name, info] of Object.entries(AGENT_MAP)) {
                if (info.patterns.some(p => msg.includes(p) || author.includes(p))) {
                    return name;
                }
            }
            return author.split(' ')[0];
        }

        async function loadDashboard() {
            try {
                const [commits, openPRs, closedPRs] = await Promise.all([
                    apiFetch(`${API}/commits?per_page=100`),
                    apiFetch(`${API}/pulls?state=open&per_page=50`),
                    apiFetch(`${API}/pulls?state=closed&sort=updated&direction=desc&per_page=50`)
                ]);

                const now = Date.now();
                const h24 = 24 * 60 * 60 * 1000;
                const commits24h = commits.filter(c => (now - new Date(c.commit.author.date)) < h24);
                const mergedToday = closedPRs.filter(pr => pr.merged_at && (now - new Date(pr.merged_at)) < h24);

                // DORA: lead time (PR create → merge)
                let avgLeadTime = '-';
                if (mergedToday.length > 0) {
                    const totalMins = mergedToday.reduce((sum, pr) => {
                        return sum + (new Date(pr.merged_at) - new Date(pr.created_at)) / 60000;
                    }, 0);
                    const avg = totalMins / mergedToday.length;
                    avgLeadTime = avg < 60 ? `${Math.round(avg)}m` : `${(avg / 60).toFixed(1)}h`;
                }

                // Agent activity from commits
                const agentActivity = {};
                for (const c of commits) {
                    const agent = detectAgent(c);
                    if (!agentActivity[agent]) {
                        agentActivity[agent] = { lastCommit: c.commit.author.date, count: 0, harness: AGENT_MAP[agent]?.harness || 'Unknown' };
                    }
                    agentActivity[agent].count++;
                }

                // Stats
                const mergeEl = document.getElementById('merge-velocity');
                mergeEl.textContent = mergedToday.length;
                mergeEl.className = `stat-value ${mergedToday.length >= 10 ? 'good' : mergedToday.length >= 3 ? '' : 'warn'}`;

                document.getElementById('lead-time').textContent = avgLeadTime;
                document.getElementById('open-prs').textContent = openPRs.length;
                document.getElementById('commits-24h').textContent = commits24h.length;

                const activeCount = Object.values(agentActivity).filter(a => (now - new Date(a.lastCommit)) < h24).length;
                document.getElementById('active-agents').textContent = activeCount;

                if (mergedToday.length > 0) {
                    document.getElementById('last-merge').textContent = timeAgo(mergedToday[0].merged_at);
                } else {
                    document.getElementById('last-merge').textContent = 'none';
                }

                // Agent list
                const agentList = document.getElementById('agent-list');
                const sortedAgents = Object.entries(agentActivity).sort((a, b) => new Date(b[1].lastCommit) - new Date(a[1].lastCommit));
                agentList.innerHTML = sortedAgents.map(([name, info]) => {
                    const minsAgo = (now - new Date(info.lastCommit)) / 60000;
                    const status = minsAgo < 30 ? 'active' : minsAgo < 360 ? 'recent' : 'stale';
                    return `<li class="agent-item">
                        <span class="agent-dot ${status}"></span>
                        <span class="agent-name">${name}</span>
                        <span class="agent-detail">${info.harness} · ${info.count} commits · ${timeAgo(info.lastCommit)}</span>
                    </li>`;
                }).join('');

                // PR queue
                const prList = document.getElementById('pr-list');
                if (openPRs.length === 0) {
                    prList.innerHTML = '<li class="pr-item"><span class="pr-title" style="color:#888">Queue clear</span></li>';
                } else {
                    prList.innerHTML = openPRs.slice(0, 10).map(pr => `
                        <li class="pr-item">
                            <span class="pr-number">#${pr.number}</span>
                            <span class="pr-title">${pr.title}</span>
                            <span class="pr-status open">${timeAgo(pr.created_at)}</span>
                        </li>
                    `).join('');
                    if (openPRs.length > 10) {
                        prList.innerHTML += `<li class="pr-item"><span class="pr-title" style="color:#888">+${openPRs.length - 10} more</span></li>`;
                    }
                }

                // Recent merged PRs below open ones
                if (mergedToday.length > 0) {
                    prList.innerHTML += mergedToday.slice(0, 5).map(pr => `
                        <li class="pr-item">
                            <span class="pr-number">#${pr.number}</span>
                            <span class="pr-title">${pr.title}</span>
                            <span class="pr-status merged">merged</span>
                        </li>
                    `).join('');
                }

                // Timeline
                const timeline = document.getElementById('timeline');
                timeline.innerHTML = commits.slice(0, 20).map(c => {
                    const agent = detectAgent(c);
                    const msg = c.commit.message.split('\n')[0];
                    return `<div class="timeline-item">
                        <div class="commit">
                            <span class="commit-hash">${c.sha.substring(0, 7)}</span>
                            <span class="commit-meta"> · ${agent} · ${timeAgo(c.commit.author.date)}</span>
                            <div class="commit-message">${msg}</div>
                        </div>
                    </div>`;
                }).join('');

                document.getElementById('refresh-info').textContent = `· Updated ${new Date().toLocaleTimeString()}`;

            } catch (e) {
                document.getElementById('timeline').innerHTML = `<div class="error">API error: ${e.message}. GitHub rate limit is 60 req/hr unauthenticated.</div>`;
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 300000); // 5min — stays under 60 req/hr unauthenticated
    </script>
</body>
</html>
