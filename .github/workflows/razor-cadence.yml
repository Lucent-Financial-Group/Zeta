name: razor-cadence

# Daily cadence for the razor-discipline trajectory. Fires whether or not
# any AI is running; opens or updates a tracking issue with a
# "razor-cadence" label that any wake-time agent can grep for as a
# cold-start check. The trigger ages and stays visible until explicitly
# resolved.
#
# Per docs/backlog/P1/B-0192-github-actions-razor-cadence-trigger-aaron-2026-05-04.md:
# the operationalization of the razor-cadence rule. Without an external
# trigger, the cadence depends on agent-remembering-to-check, which
# empirically does not happen reliably. This workflow IS the mechanization.
#
# Carved sentence (from B-0192):
#   "Encoding rules without mechanizing them produces a memory of failures,
#   not prevention. GitHub Actions on schedule fires whether or not any
#   AI exists; the next wake-time agent picks up the artifact. The trigger
#   ages and stays visible; the discipline does not."
#
# Composes with:
#  - B-0190 (memory substrate-engineering trajectory) -- trajectory-review
#    action will live alongside this one, scheduled separately.
#  - B-0191 (orchestrator branch-verify mechanization) -- pre-commit hooks
#    are the per-commit half; this is the cadence half.
#  - feedback_dialectical_unfalsifiability_detection_razor_extension_*.md
#    -- Test 2 of the razor (what observation would falsify) is one of
#    the cadence-checklist items.
#
# Out of scope (per B-0192): razor-content authoring (what the razor
# reviews actually check) is per-rule and not part of this trigger
# mechanization. The workflow surfaces a visible artifact; the agent
# picking it up runs the actual razor pass.
#
# Security note (safe-pattern compliance per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/):
# this workflow consumes only first-party trusted context plus the
# workflow_dispatch `note` input. Every expression is routed via env:
# into run blocks and quoted there as "$VAR"; no expressions are
# interpolated directly inside run-block scripts. NOTE_INPUT is treated
# as untrusted (workflow_dispatch caller has dispatch permissions but
# input content is still sanitized via env:+quoted-substitution).
# Body template lives in tools/razor-cadence/issue-body-template.md
# (separate file to avoid YAML-literal-block indentation entanglement).

on:
  schedule:
    # Daily 09:17 UTC -- off-the-hour to avoid GHA cron thundering-herd
    # (per .github/workflows/budget-snapshot-cadence.yml convention).
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note to attach to this cadence fire"
        required: false
        default: ""

permissions:
  # Top-level: read-only by default per Scorecard TokenPermissions
  # best-practice. The job below scopes write permissions narrowly.
  contents: read

concurrency:
  # Only one cadence run at a time. Retriggers cancel-in-progress
  # because the artifact is idempotent (open-or-update tracking issue);
  # a half-completed run is safe to abandon and restart.
  group: razor-cadence
  cancel-in-progress: true

jobs:
  fire:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      # issues:write to open/update the tracking issue. contents:read
      # is the inherited top-level default; no other scopes needed.
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Shallow clone -- we only need the body template, not history.
          fetch-depth: 1

      - name: Verify required tooling
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Only `gh` is required -- the JSON-shaping `--jq` flag below
          # is handled by `gh` itself, no external `jq` binary needed.
          command -v gh >/dev/null
          gh auth status

      - name: Open or update razor-cadence tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTE_INPUT: ${{ github.event.inputs.note || '' }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BODY_TEMPLATE: tools/razor-cadence/issue-body-template.md
        run: |
          set -euo pipefail
          today="$(date -u +%Y-%m-%d)"
          title="Razor cadence due -- $today"

          # Read body template from tracked file. Read entirely as data
          # via shell parameter expansion below; no shell interpretation
          # of the file content.
          if [ ! -f "$BODY_TEMPLATE" ]; then
            echo "ERROR: body template not found at $BODY_TEMPLATE" >&2
            exit 1
          fi
          body="$(cat "$BODY_TEMPLATE")"

          # Substitute placeholders via bash parameter expansion only
          # (no eval, no command substitution on untrusted paths).
          # RUN_ID is first-party trusted; today computed from `date -u`.
          body="${body//RUN_ID_PLACEHOLDER/$RUN_ID}"
          body="${body//TODAY_PLACEHOLDER/$today}"

          # Append optional note. NOTE_INPUT is untrusted; appended into
          # markdown body where it cannot be interpreted as shell. The
          # body is passed via gh issue create --body "$body" with
          # double-quotes preserving all content as-is to argv.
          if [ -n "${NOTE_INPUT:-}" ]; then
            body="$(printf '%s\n\n### Note\n\n%s\n' "$body" "$NOTE_INPUT")"
          fi

          # Check for an existing open issue with the razor-cadence label
          # that we can update instead of creating a new one. This keeps
          # the issue list compact (one tracking issue at a time, not one
          # per day forever). Empty result means create new.
          existing="$(gh issue list \
            --repo "$REPO" \
            --label razor-cadence \
            --state open \
            --json number,title \
            --limit 1 \
            --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            echo "Updating existing razor-cadence tracking issue #$existing"
            gh issue edit "$existing" \
              --repo "$REPO" \
              --title "$title" \
              --body "$body"
            gh issue comment "$existing" \
              --repo "$REPO" \
              --body "Cadence fired again on $today (run $RUN_ID). The checklist above is the standing one; close this issue once the pass has been run."
          else
            echo "Opening new razor-cadence tracking issue"
            # Create the razor-cadence label if it doesn't exist
            # (idempotent). Capture stderr so we can distinguish the
            # already-exists case (suppress) from real failures
            # (permissions, rate-limit, transient API outage --
            # surface those instead of swallowing).
            label_err="$(mktemp)"
            if ! gh label create razor-cadence \
              --repo "$REPO" \
              --description "Razor-cadence trigger artifact -- fires daily via .github/workflows/razor-cadence.yml" \
              --color "FBCA04" 2>"$label_err"; then
              if grep -q "already exists" "$label_err"; then
                : # already exists, fine
              else
                echo "ERROR: gh label create failed for non-already-exists reason:" >&2
                cat "$label_err" >&2
                rm -f "$label_err"
                exit 1
              fi
            fi
            rm -f "$label_err"

            gh issue create \
              --repo "$REPO" \
              --title "$title" \
              --body "$body" \
              --label razor-cadence
          fi
