name: memory-index-drift

# Enforces that memory/MEMORY.md stays in sync with the memory heap
# (memory/*.md frontmatter) after changes land in a PR or on main.
#
# Architecture (B-0259 + B-0423):
#   - memory/*.md files are heap-state-acceptable — they MAY commit
#     without a same-commit MEMORY.md update when the harness hook
#     (post-write-memory-reindex.ts) is active, since the hook auto-
#     regenerates MEMORY.md on every agent write.
#   - This workflow is the CI backstop: it catches drift from pushes
#     that bypass the hook (human contributors, force-pushes, etc.).
#   - The check exits 0 when MEMORY.md is current, 2 when stale.
#     Exit 2 is treated as failure here, and the remediation is printed.
#
# Remediation — if this check fails:
#   1. Run: bun tools/memory/reindex-memory-md.ts
#   2. Stage: git add memory/MEMORY.md
#   3. Amend or add a commit: git commit --amend or git commit -m "chore: regenerate MEMORY.md"
#   4. Push.
#
# Safe-pattern compliance (mirrors memory-index-integrity.yml):
#   - SHA-pinned action versions (actions/checkout@de0fac2...)
#   - Explicit `permissions:` minimum
#   - Only first-party trusted context (github.sha, github.event.*).
#     No user-authored text is referenced anywhere.
#   - Values passed via env: and quoted in shell.
#   - Concurrency group + cancel-in-progress: false.
#   - runs-on: ubuntu-24.04 pinned.
#
# See:
#   - docs/backlog/P1/B-0259-memory-md-hook-and-ci-drift-enforcement-2026-05-08.md
#   - docs/backlog/P1/B-0423-memory-md-serialization-point-2026-05-12.md
#   - tools/memory/reindex-memory-md.ts  (the generator; --check flag)
#   - .claude/hooks/post-write-memory-reindex.ts  (the harness hook)

on:
  pull_request:
    paths:
      - "memory/**"
  push:
    branches: [main]
    paths:
      - "memory/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: memory-index-drift-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: check MEMORY.md generated-index drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        run: ./tools/setup/install.sh

      - name: Check MEMORY.md is current
        shell: bash
        run: |
          set -euo pipefail

          if bun tools/memory/reindex-memory-md.ts --check; then
            echo "MEMORY.md is current — OK" >&2
          else
            echo "" >&2
            echo "MEMORY.md is STALE — regenerate before merging." >&2
            echo "" >&2
            echo "Remediation:" >&2
            echo "  1. bun tools/memory/reindex-memory-md.ts" >&2
            echo "  2. git add memory/MEMORY.md" >&2
            echo "  3. git commit -m 'chore: regenerate MEMORY.md'" >&2
            echo "  4. git push" >&2
            echo "" >&2
            echo "The harness hook (.claude/hooks/post-write-memory-reindex.ts)" >&2
            echo "auto-regenerates MEMORY.md during agent editing sessions." >&2
            echo "If you edited memory files manually without the hook active," >&2
            echo "run the reindexer manually before pushing." >&2
            exit 1
          fi
