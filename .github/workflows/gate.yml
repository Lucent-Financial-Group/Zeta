# Zeta CI gate — Phase 1 per docs/research/ci-gate-inventory.md.
#
# Runs on every PR (opened / reopened / synchronize / ready_for_review)
# and every push to main, plus workflow_dispatch for manual triage.
#
# Discipline (design doc: docs/research/ci-workflow-design.md, human
# maintainer reviewed 2026-04-18; parity-swap landed round 32; matrix
# refresh 2026-04-24 per PR #375):
#   - Runners pinned to explicit versions (not -latest). Active build-
#     and-test matrix: macos-26, ubuntu-24.04, ubuntu-24.04-arm.
#     The ubuntu-slim low-memory verification leg moved to
#     `.github/workflows/low-memory.yml` per maintainer 2026-04-27
#     — too slow for per-PR gating; runs on every push to main +
#     nightly schedule (in practice every merge, since direct
#     pushes are blocked by branch protection).
#     Lint jobs pinned to ubuntu-24.04 (short-lived, OS-independent
#     work; bumped from 22.04 on 2026-04-28 per the human
#     maintainer's input + version-currency discipline —
#     ubuntu-latest = 24.04 since Jan 2025).
#     Windows legs deferred to peer-harness milestone.
#   - Third-party actions SHA-pinned by full 40-char commit SHA;
#     trailing `# vX.Y.Z` comments for humans.
#   - permissions: contents: read at the workflow level; no job
#     elevates. The only secret referenced is the auto-generated
#     per-run secrets.GITHUB_TOKEN (see workflow-level env: block
#     below) — needed because mise's aqua: backend authenticates
#     to the GitHub API for release-tag lookups. The token
#     inherits the read-only permissions; no write escalation.
#     Workflow-level scope chosen over per-step for DRY (~7
#     install-toolchain steps would otherwise repeat the env);
#     trade-off documented at the env: block.
#   - Concurrency: workflow-scoped; cancel-in-progress only for PR
#     events (main pushes queue so every main commit gets a record).
#   - fail-fast: false so one OS failure doesn't hide another.
#   - NuGet cache keyed on Directory.Packages.props hash; runner.os
#     prefixed so macOS + Linux caches don't collide.
#   - Three-way parity per GOVERNANCE §24: dev laptop, CI runner,
#     and (future) devcontainer all bootstrap via the same
#     `tools/setup/install.sh`. This makes TLC + Alloy jars, Lean/
#     elan, mise-pinned dotnet + python, and dotnet-tools available
#     on CI without a separate YAML-maintained list — the manifests
#     under `tools/setup/manifests/` are the single source of truth.
#   - `mise trust` policy: `.mise.toml` trust is ceremony that
#     becomes meaningful once branch-protection-on-main is live
#     (reviewer gate before any change lands). Until that flips,
#     `.mise.toml` changes get `threat-model-critic` reviewer-floor
#     cover per GOVERNANCE §20. See docs/security/V1-SECURITY-GOALS.md.

name: gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# Workflow-level env: exposes GITHUB_TOKEN to every step so mise's
# `aqua:` backend (used for uv / shellcheck / actionlint /
# markdownlint-cli2 / etc) can authenticate its GitHub API calls.
# Without a token, mise hits the unauthenticated rate limit
# (60 requests per hour per IP, shared across all GitHub Actions
# runners) and fails to fetch release tags with a 403. With the
# token, the limit is 5000/hr per token. See
# https://mise.jdx.dev/dev-tools/github-tokens.html for mise's
# supported token sources. The token inherits the workflow's
# `permissions: contents: read` — no write escalation; mise only
# reads release-tag metadata.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Dynamic matrix for build-and-test: pre-merge events (pull_request
  # and merge_group) get Linux-only (production build path, fast —
  # keeps PR checks and merge-queue runs short). Push-to-main /
  # workflow_dispatch get the full set including macos-26
  # (developer-experience verification) and the Windows experimental
  # legs. Standard GitHub-hosted runners are free for public repos so
  # the post-merge run has no cost downside.
  matrix-setup:
    name: matrix setup
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    outputs:
      os: ${{ steps.set.outputs.os }}
    steps:
      - id: set
        shell: bash
        run: |
          # Pre-merge (pull_request + merge_group): Linux + macos-26
          # (~5 min wall clock with macos in parallel). macos-26 is
          # required by branch protection's required-status-checks,
          # so it runs on every PR — moved back to per-PR cadence
          # 2026-04-28 after maintainer correction ("we pull out mac
          # and codeql to merge to main time instead of per pr, and
          # then moved it back to per pr"). The earlier per-merge-only
          # split structurally blocked the PR queue.
          # Push-to-main / workflow_dispatch: full surface adds Windows
          # legs (peer-harness milestone seeding per maintainer
          # 2026-04-27). Windows legs are gated by `continue-on-error:
          # true` at the build-and-test job level so initial failures
          # (e.g. missing tools/setup/install.ps1) don't block per-merge
          # runs while the peer-agent polishes the path.
          if [ "${GH_EVENT}" = "pull_request" ] || [ "${GH_EVENT}" = "merge_group" ]; then
            echo 'os=["ubuntu-24.04","ubuntu-24.04-arm","macos-26"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-24.04","ubuntu-24.04-arm","macos-26","windows-2025","windows-11-arm"]' >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_EVENT: ${{ github.event_name }}

  # F# / .NET path filter for build-and-test step-gating (B-0125).
  #
  # PR docs-only PRs (touching only docs/**, memory/**, openspec/**,
  # *.md at root, etc.) do NOT need to run F# install + dotnet build
  # + dotnet test — those steps take 5-10 minutes per OS-leg and
  # produce no signal on doc-only changes. This job emits a single
  # boolean `code` indicating whether code-substrate paths were
  # touched; build-and-test gates its expensive steps on it.
  #
  # Required-status-check compatibility: build-and-test STILL RUNS
  # on docs-only PRs (so the required check name is reported as
  # passing); only the heavy steps inside it are skipped. This avoids
  # tripping `code_quality severity:all` which reads skipped jobs as
  # failure rather than success.
  #
  # Default safety: any non-PR event (push to main, merge_group,
  # workflow_dispatch — no `schedule:` trigger is currently configured)
  # gets `code=true` via the fast-path step (no checkout needed).
  # Path-filter is a per-PR optimization, never a path that hides
  # a code change from main-tip CI.
  #
  # Job output composition (per Copilot review on PR #1185, 2026-05-02):
  # - Non-PR events: fast-path step `nonpr` writes `code=true` without
  #   any checkout — saves the full-history fetch on every push to main
  #   and every merge_group run.
  # - Pull-request events: checkout + git diff base..head + classify
  #   per the path-list below; `detect` step writes `code=true|false`.
  # - Job output `code` resolves via `||` to whichever step ran
  #   (GH Actions falsy-string fallback).
  path-filter:
    name: path filter
    runs-on: ubuntu-24.04
    # 5 min covers the full-history checkout (`fetch-depth: 0`) on
    # slow runners. The non-PR fast path runs in ~5 sec without any
    # checkout, well under the cap.
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code || steps.nonpr.outputs.code }}
    steps:
      # Fast-path for non-PR events: emit code=true without cloning
      # the repo. Push-to-main / merge_group / workflow_dispatch all
      # take this path — preserves the per-PR-optimization invariant
      # (path-filter is never the mechanism that hides a code change
      # from main-tip CI).
      - id: nonpr
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
        run: |
          echo "Event ${GH_EVENT} (not pull_request) — emitting code=true (full build), no checkout needed."
          echo "code=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need both PR base and head shas for git diff. fetch-depth: 0
          # gets full history; the 5-minute job timeout above is sized
          # for this on slow runners.
          fetch-depth: 0

      - id: detect
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Diff base..head of the PR to enumerate changed files.
          CHANGED=$(git diff --name-only "${PR_BASE_SHA}" "${PR_HEAD_SHA}")
          echo "Changed files in PR:"
          # Two-space indent each line via parameter expansion (pure
          # bash; SC2001-clean — no `sed s/^/  /` shell-out).
          INDENTED=${CHANGED//$'\n'/$'\n'  }
          echo "  ${INDENTED}"

          # Pure-docs surfaces never trigger the F# build/test path:
          #   docs/**       — repo documentation (incl. backlog/, hygiene-history/, research/)
          #   memory/**     — in-repo memory files
          #   openspec/**   — behavioral specs (no F# touch)
          #   *.md at root  — README, AGENTS, GOVERNANCE, CLAUDE.md, etc.
          #   .claude/**    — skill / agent / rule definitions (text only)
          #   .github/ISSUE_TEMPLATE, .github/PULL_REQUEST_TEMPLATE — text only
          #   .gitignore / .gitattributes — text only
          #   *.txt / LICENSE — text only
          #
          # Anything else (incl. src/**, tests/**, tools/**, *.fs, *.fsproj,
          # *.csproj, .github/workflows/**, global.json, Directory.Packages.props,
          # Zeta.sln, .config/dotnet-tools.json) flips code=true.
          HAS_CODE="false"
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            case "${f}" in
              docs/*|memory/*|openspec/*|.claude/*|.github/ISSUE_TEMPLATE/*|.github/PULL_REQUEST_TEMPLATE.md|.github/copilot-instructions.md)
                ;;
              .gitignore|.gitattributes|LICENSE|*.txt)
                ;;
              *.md)
                # Root-level markdown (README, AGENTS, GOVERNANCE,
                # CLAUDE.md, etc.) — non-build surface.
                case "${f}" in
                  */*) HAS_CODE="true" ;;  # under a subdir we don't recognize as docs-only
                  *) ;;                     # at repo root → docs surface
                esac
                ;;
              *)
                HAS_CODE="true"
                ;;
            esac
          done <<< "${CHANGED}"

          if [ "${HAS_CODE}" = "true" ]; then
            echo "Code-substrate path touched — emitting code=true (full build)."
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs-only PR — emitting code=false (skip F# install/build/test)."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    # Final runner matrix (maintainer ask 2026-04-24): symmetric
    # across AceHack fork and LFG canonical — same legs run everywhere.
    # Standard GitHub-hosted runners are free for public repositories,
    # so the prior fork/LFG cost-opt split (which kept macOS off LFG)
    # no longer applies.
    #
    # Active legs (3):
    #   - macos-26          macOS 26, Apple Silicon M1 (3 CPU, 7 GB)
    #   - ubuntu-24.04      Ubuntu 24.04 LTS x64 (4 CPU, 16 GB)
    #   - ubuntu-24.04-arm  Ubuntu 24.04 LTS arm64 (4 CPU, 16 GB)
    #
    # Moved-to-nightly leg (per maintainer 2026-04-27):
    #   - ubuntu-slim       Ubuntu slim x64 (1 vCPU, 5 GB RAM;
    #                       15-minute HARD job cap). Too slow for
    #                       per-PR gating (~10+ min vs ~1.5 min on
    #                       ubuntu-24.04 — ~7× slower, often times
    #                       out at the runner-class cap). Goal of
    #                       the slim leg is verifying low-memory
    #                       compat — a per-merge + nightly cadence
    #                       satisfies that without bottlenecking PR
    #                       landing. Now runs via
    #                       `.github/workflows/low-memory.yml`
    #                       (push-to-main + 06:00 UTC schedule +
    #                       workflow_dispatch).
    #                       Reference:
    # https://github.blog/changelog/2026-01-22-1-vcpu-linux-runner-now-generally-available-in-github-actions/
    #
    # Per-merge experimental legs (maintainer 2026-04-27 — replaces
    # the prior 2026-04-24 deferral so Windows infrastructure is
    # mostly-ready when the peer-mode agent comes online):
    #   - windows-2025      Windows Server 2025 x64 (4 CPU, 16 GB)
    #   - windows-11-arm    Windows 11 arm64 (4 CPU, 16 GB)
    # These run only on push-to-main / schedule / workflow_dispatch
    # (not on PR — same cadence as macos-26). They carry
    # `continue-on-error: true` because no PowerShell install script
    # exists yet (`tools/setup/install.ps1` TBD); failures are
    # visible-but-not-blocking until the peer-agent polishes the
    # path.
    #
    # fail-fast: false so one leg's failure doesn't cancel the
    # others — we want the full signal across the matrix.
    #
    # Per-PR / per-merge cadence split (maintainer 2026-04-27):
    # - macos-26: developer-experience verification, NOT prod build.
    #   Runs only on push-to-main + schedule + workflow_dispatch.
    #   Same rationale as the Analyze (csharp) move below.
    # - ubuntu-24.04 + ubuntu-24.04-arm: production build path; runs
    #   on every PR + push-to-main.
    # The matrix is built dynamically by `matrix-setup` so PR runs
    # only get the Linux legs while push-to-main / schedule /
    # workflow_dispatch run all three.
    name: build-and-test (${{ matrix.os }})
    timeout-minutes: 45
    needs: [matrix-setup, path-filter]
    # Windows legs are experimental until tools/setup/install.ps1
    # exists; mark them non-blocking so initial failures don't gate
    # per-merge runs. Linux + macOS legs are blocking.
    continue-on-error: ${{ startsWith(matrix.os, 'windows-') }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.matrix-setup.outputs.os) }}
    runs-on: ${{ matrix.os }}

    # Path-filter step-gating (B-0125 / 2026-05-02): when the PR
    # touches only docs/memory/openspec/etc., the heavy F# install +
    # dotnet build + dotnet test steps below are skipped. The job
    # itself still runs (status check name reports green) so
    # required-status-checks and `code_quality severity:all` see
    # success rather than "skipped". Cache + checkout steps are
    # cheap and unconditional. See `path-filter` job above for the
    # detection logic.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Path-filter result (B-0125)
        shell: bash
        env:
          CODE_PATH: ${{ needs.path-filter.outputs.code }}
        run: |
          if [ "${CODE_PATH}" = "true" ]; then
            echo "Path filter: code=true — running full F# build/test."
          else
            echo "Path filter: code=false — docs-only PR, will skip F# install/build/test steps."
          fi

      # Cache keys include `runner.arch` in addition to `runner.os` so
      # Linux x64 (ubuntu-24.04, ubuntu-slim) and Linux arm64
      # (ubuntu-24.04-arm) do not share entries for arch-sensitive
      # paths. `runner.os` resolves to `Linux` on both arches, which
      # would otherwise cause wrong-arch restores (for example,
      # `~/.dotnet` with x64 binaries restored onto arm64). See
      # https://docs.github.com/en/actions/learn-github-actions/
      # contexts#runner-context for `runner.arch` values.
      - name: Cache .NET SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dotnet
          key: dotnet-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('global.json', 'tools/setup/common/dotnet.sh') }}

      - name: Cache mise runtimes (python only post round 32)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/mise
            ~/.cache/mise
          key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise.toml') }}

      - name: Cache elan (Lean 4 toolchain)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('tools/setup/common/elan.sh') }}

      - name: Cache verifier jars (TLC + Alloy)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          # Path narrowed 2026-05-03 to specific jar files only. The
          # prior pattern (`tools/tla` + `tools/alloy` as whole
          # directories) caused cache hits to OVERWRITE source-
          # controlled spec files (`tools/tla/specs/*.tla` /
          # `*.cfg`, `tools/alloy/specs/*.als`,
          # `tools/alloy/AlloyRunner.java`). Failure mode: PR edits
          # to specs were silently reverted to whatever version was
          # cached, while the test report claimed CI ran "the new"
          # spec. Surfaced empirically by #1401 (CircuitRegistration
          # Safety invariant fix passing locally but failing on CI
          # with the pre-fix error). Cache key suffix `-v2` busts
          # the stale cache containing the pre-narrow content.
          path: |
            tools/tla/tla2tools.jar
            tools/alloy/alloy.jar
          # Manifest is the single source of truth — cache busts when
          # either URL or (future) SHA changes. Jars are JVM bytecode
          # so arch-neutral; key kept os-only on purpose.
          key: verifiers-${{ runner.os }}-${{ hashFiles('tools/setup/manifests/verifiers') }}-v2

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          # Keys on `Directory.Packages.props`. The `packages.lock.json`
          # ideal is round-33 Track B. No `restore-keys` — partial hit
          # would restore against different resolved versions.
          # `runner.arch` is included because some NuGet packages ship
          # native RID-specific assets (for example, runtime.linux-
          # x64.*).
          key: nuget-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # Single source of truth for toolchain state. Installs:
        # .NET SDK (per global.json, via Microsoft's dotnet-install.sh
        # — round-32 refactor out of mise), python (mise-pinned),
        # elan (Lean manager), dotnet global tools, TLC + Alloy
        # verifier jars. shellenv.sh emits BASH_ENV into $GITHUB_ENV
        # so every subsequent bash `run:` step auto-sources the
        # managed shellenv file (SQLSharp-proven pattern).
        if: needs.path-filter.outputs.code == 'true'
        run: ./tools/setup/install.sh

      - name: Build (0 Warning(s) / 0 Error(s) required)
        # BASH_ENV (set by shellenv.sh during the install step) has
        # already pointed this shell at the managed shellenv file;
        # no explicit source needed.
        if: needs.path-filter.outputs.code == 'true'
        run: dotnet build Zeta.sln -c Release

      - name: Test
        if: needs.path-filter.outputs.code == 'true'
        run: dotnet test Zeta.sln -c Release --no-build --verbosity normal

      - name: Skipped (docs-only PR)
        # Status-check passthrough: when the path filter said code=false,
        # the job still completes successfully so required-status-checks
        # see green. This step is the visible signal that the F# build
        # was skipped intentionally.
        if: needs.path-filter.outputs.code != 'true'
        run: echo "build-and-test skipped on docs-only PR (B-0125 path-filter)."

  lint:
    # Semgrep runs every rule in `.semgrep.yml` — 14+ custom rules
    # codifying F# / security / supply-chain anti-patterns. Single OS
    # since rules are OS-independent; saves minutes.
    #
    # Round 30 posture fix: before this job existed, 14 rules were
    # codified but 0 gated the build. See docs/security/
    # THREAT-MODEL.md "mitigation validation" section + round-30
    # elevation design (docs/research/threat-model-elevation.md).
    name: lint (semgrep)
    timeout-minutes: 10
    runs-on: ubuntu-24.04

    # Toolchain via three-way-parity install.sh (GOVERNANCE §24): same
    # semgrep version that dev laptops + devcontainers get, pinned in
    # `.mise.toml` as `pipx:semgrep`. No `actions/setup-python` here
    # — the host-portability invariant is to minimise GitHub-specific
    # surface so switching CI hosts is cheap, and to keep dev-machine
    # and build-machine setup as close as possible. Resolves Scorecard
    # PinnedDependenciesID #17 + #18 (pip install --upgrade pip + pip
    # install semgrep) by removing the unpinned pip-bootstrap surface
    # entirely.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # Single source of truth for toolchain state. mise installs
        # python + semgrep (the latter via the `pipx:semgrep` pin in
        # `.mise.toml`, which mise auto-routes through `uv tool install`
        # since uv is in the toolchain — see ADR
        # docs/DECISIONS/2026-04-27-uv-canonical-python-tool-manager.md).
        # shellenv.sh wires BASH_ENV so subsequent run: steps auto-
        # source the managed shellenv. Same pattern as build-and-test
        # job above.
        run: ./tools/setup/install.sh

      - name: Run Semgrep
        # --error exits non-zero if any rule matches. The 14 rules in
        # `.semgrep.yml` are ERROR or WARNING; --error flips any match
        # into a hard-fail regardless of declared severity. Rationale:
        # under nation-state posture per round-30 elevation, a lint
        # rule without a gate isn't a control.
        run: semgrep --config .semgrep.yml --error --metrics=off

  lint-shell:
    # Shellcheck on every bash script under tools/setup/ + tools/.
    # Round 33 static-analysis expansion (Aaron: "as much static
    # analysis as possible, match or surpass SQLSharp + scratch").
    # See openspec/specs/static-analysis/profiles/shell.md.
    name: lint (shellcheck)
    timeout-minutes: 5
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache install.sh outputs (mise runtimes + dotnet tools + verifier jars)
        # Comprehensive cache of everything `tools/setup/install.sh`
        # writes — keeps dev laptops and CI runners as close to the
        # same state as possible per the human maintainer's
        # 2026-04-28 input: dev setup and build-machine setup
        # should be as close to the same as possible; cache the
        # whole install/setup output rather than per-component.
        # Without comprehensive caching every CI run hits CDNs cold
        # (mise.run + GitHub releases for bun/shellcheck/actionlint +
        # NuGet + Lean toolchain). Transient 502s become avoidable
        # failures rather than first-run-only cost.
        # Cache key hashes BOTH .mise.toml (runtime versions) AND
        # tools/setup/** (install logic itself) so changes to either
        # invalidate cache → vanilla install path gets re-tested
        # whenever the install discipline changes.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/mise
            ~/.local/share/mise
            ~/.cache/mise
            ~/.dotnet/tools
            ~/.elan
            ~/.config/zeta
          key: install-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise.toml', 'tools/setup/**', 'global.json') }}

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # Installs shellcheck via mise (pinned in .mise.toml). Single
        # source of truth — the same version on dev laptops + CI
        # runners. Prior step relied on shellcheck shipping pre-
        # installed on ubuntu (any version), which broke parity (dev machines
        # may have a different version) and wouldn't survive newer
        # runner images like ubuntu-slim that don't ship shellcheck.
        # Note: install.sh is idempotent (detect-first-install-else-update);
        # safe to run on every CI invocation including cache-hit (it
        # short-circuits when tools are already present).
        # CI-level retry per the human maintainer's 2026-04-28
        # input: PR #23 (on AceHack) failed because mise's
        # internal 3-attempt retry exhausted on a github releases
        # CDN 502 for bun-1.3.13. CI runs are non-interactive so
        # retry is safe; dev runs stay interactive (user decides).
        # 5 attempts; backoff 10s/30s/60s/120s covers short-burst
        # through multi-minute CDN outages. The retry wrapper is
        # currently inline-duplicated across multiple jobs;
        # extracting to a composite action is a follow-up
        # improvement candidate.
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if ./tools/setup/install.sh; then exit 0; fi
            [ "$attempt" = "5" ] && { echo "install.sh failed after 5 attempts"; exit 1; }
            # Backoff: 10s, 30s, 60s, 120s — covers transient CDN
            # blips from short-burst-and-recover up to multi-minute
            # outages. Aaron 2026-04-28 input: bumped from 3 to 5
            # because PR #23's bun-1.3.13 502 burned all 3 prior
            # mise-internal retries and a 3-attempt wrapper on top
            # didn't add enough margin.
            case "$attempt" in
              1) backoff=10 ;;
              2) backoff=30 ;;
              3) backoff=60 ;;
              4) backoff=120 ;;
            esac
            echo "install.sh attempt $attempt failed; retrying in ${backoff}s..." >&2
            sleep "$backoff"
          done

      - name: Run shellcheck
        # Scope: Zeta's own scripts under `tools/setup/` only —
        # `tools/lean4/.lake/packages/**` is Lean/Mathlib vendored
        # code not governed by Zeta standards.
        # Format: -f gcc for file:line:col:msg output parseable by
        # IDEs. Severity floor: style (catches everything including
        # style warnings; we can relax to warning if noise is high).
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find tools -name "*.sh" -type f \
              -not -path "tools/lean4/.lake/*" \
              | sort
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell scripts found under tools/; skipping"
            exit 0
          fi
          echo "shellcheck targets:"
          printf '  %s\n' "${files[@]}"
          shellcheck --format=gcc --severity=style "${files[@]}"

  lint-workflows:
    # actionlint catches .github/workflows/*.yml bugs: unknown
    # context refs, invalid runner labels, shellcheck-style warnings
    # on run: blocks, wrong action syntax. Round 33 static-analysis
    # expansion. See openspec/specs/static-analysis/profiles/
    # github-actions.md.
    name: lint (actionlint)
    timeout-minutes: 5
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache install.sh outputs (mise runtimes + dotnet tools + verifier jars)
        # Comprehensive cache — see lint-shell job above for the
        # rationale (the human maintainer's 2026-04-28 dev-CI parity input +
        # transient 502 prevention). Same cache key shape so all
        # lint jobs share the cache when toolchain unchanged.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/bin/mise
            ~/.local/share/mise
            ~/.cache/mise
            ~/.dotnet/tools
            ~/.elan
            ~/.config/zeta
          key: install-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.mise.toml', 'tools/setup/**', 'global.json') }}

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # See lint-shell job above for retry rationale (Aaron 2026-04-28).
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if ./tools/setup/install.sh; then exit 0; fi
            [ "$attempt" = "5" ] && { echo "install.sh failed after 5 attempts"; exit 1; }
            # Backoff: 10s, 30s, 60s, 120s — covers transient CDN
            # blips from short-burst-and-recover up to multi-minute
            # outages. Aaron 2026-04-28 input: bumped from 3 to 5
            # because PR #23's bun-1.3.13 502 burned all 3 prior
            # mise-internal retries and a 3-attempt wrapper on top
            # didn't add enough margin.
            case "$attempt" in
              1) backoff=10 ;;
              2) backoff=30 ;;
              3) backoff=60 ;;
              4) backoff=120 ;;
            esac
            echo "install.sh attempt $attempt failed; retrying in ${backoff}s..." >&2
            sleep "$backoff"
          done

      - name: Run actionlint
        # -ignore 'unknown permission scope "administration"' is a
        # documented workaround for a known actionlint gap — the
        # `administration` permission IS valid in GitHub Actions
        # (used by .github/workflows/github-settings-drift.yml to
        # read rulesets + branch protection + security_and_analysis)
        # but actionlint v1.7.x has not yet added it to its allow-
        # list. Remove when actionlint catches up. See:
        # https://github.com/rhysd/actionlint/issues (search
        # "administration permission").
        run: actionlint -color -ignore 'unknown permission scope "administration"'

  lint-tick-history-order:
    # Validates that docs/hygiene-history/loop-tick-history.md
    # rows appear in non-decreasing chronological order
    # (specifically: the LAST row in the file is the latest
    # timestamp). This catches the recurring row-ordering bug
    # where the Edit tool's old_string=existing-line pattern
    # inserts the new row BEFORE the matched line, producing
    # reverse-chronological order. Maintainer 2026-04-26 asked for
    # structural prevention after the bug was caught at least
    # three times across recent ticks. The check is the
    # "fail-fast at commit/push time" mechanism that doesn't
    # rely on each agent's vigilance — Otto-339 anywhere-means-
    # anywhere applied to discipline-enforcement: enforce at
    # the layer that catches all paths, not at the input-tool
    # layer.
    name: lint (tick-history order)
    timeout-minutes: 2
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # Provides bun via mise's pin in .mise.toml. Same pattern as
        # memory-index-duplicate-lint.yml (#1377) +
        # memory-reference-existence-lint.yml (#1378). shellenv.sh
        # wires BASH_ENV so subsequent run: steps auto-source the
        # managed shellenv with bun on PATH.
        run: ./tools/setup/install.sh

      - name: Run check-tick-history-order
        run: bun tools/hygiene/check-tick-history-order.ts

  lint-no-conflict-markers:
    # Fail if any committed file contains git merge-conflict markers
