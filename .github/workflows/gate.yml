# Zeta CI gate — Phase 1 per docs/research/ci-gate-inventory.md.
#
# Runs on every PR (opened / reopened / synchronize / ready_for_review)
# and every push to main, plus workflow_dispatch for manual triage.
#
# Discipline (design doc: docs/research/ci-workflow-design.md, Aaron-
# reviewed 2026-04-18):
#   - Runners digest-pinned (ubuntu-22.04, macos-14), not -latest.
#   - Third-party actions SHA-pinned by full 40-char commit SHA;
#     trailing `# vX.Y.Z` comments for humans.
#   - permissions: contents: read at the workflow level; no job
#     elevates. No secrets referenced.
#   - Concurrency: workflow-scoped; cancel-in-progress only for PR
#     events (main pushes queue so every main commit gets a record).
#   - fail-fast: false so one OS failure doesn't hide another.
#   - NuGet cache keyed on packages.lock.json hash; runner.os
#     prefixed so macOS + Linux caches don't collide.
#   - Parity-drift flag: `actions/setup-dotnet` is a temporary
#     stand-in. GOVERNANCE §24 target is tools/setup/install.sh in
#     CI for three-way parity. Backlog item
#     (docs/BACKLOG.md "Parity swap: CI's actions/setup-dotnet →
#     tools/setup/install.sh").

name: gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET SDK (temporary parity-drift per GOVERNANCE §24 backlog)
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          # Cache key keys on the central-package-management file. The
          # `packages.lock.json` ideal (restore-with-lock-file) needs
          # <RestorePackagesWithLockFile>true</RestorePackagesWithLockFile>
          # set per-project and committed lock files — backlogged. Until
          # then, Directory.Packages.props pinning is the only stable
          # input; we DO NOT use `restore-keys` because a prefix match
          # would restore a cache built against different resolved versions.
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Build (0 Warning(s) / 0 Error(s) required)
        run: dotnet build Zeta.sln -c Release

      - name: Test
        run: dotnet test Zeta.sln -c Release --no-build --verbosity normal

  lint:
    # Semgrep runs every rule in `.semgrep.yml` — 14+ custom rules
    # codifying F# / security / supply-chain anti-patterns. Single OS
    # since rules are OS-independent; saves minutes.
    #
    # Round 30 posture fix: before this job existed, 14 rules were
    # codified but 0 gated the build. See docs/security/
    # THREAT-MODEL.md "mitigation validation" section + round-30
    # elevation design (docs/research/threat-model-elevation.md).
    name: lint (semgrep)
    timeout-minutes: 10
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        # --error exits non-zero if any rule matches. The 14 rules in
        # `.semgrep.yml` are ERROR or WARNING; --error flips any match
        # into a hard-fail regardless of declared severity. Rationale:
        # under nation-state posture per round-30 elevation, a lint
        # rule without a gate isn't a control.
        run: semgrep --config .semgrep.yml --error --metrics=off
