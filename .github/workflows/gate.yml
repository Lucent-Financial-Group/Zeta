# Zeta CI gate — Phase 1 per docs/research/ci-gate-inventory.md.
#
# Runs on every PR (opened / reopened / synchronize / ready_for_review)
# and every push to main, plus workflow_dispatch for manual triage.
#
# Discipline (design doc: docs/research/ci-workflow-design.md, Aaron-
# reviewed 2026-04-18; parity-swap landed round 32):
#   - Runners digest-pinned (ubuntu-22.04, macos-14), not -latest.
#   - Third-party actions SHA-pinned by full 40-char commit SHA;
#     trailing `# vX.Y.Z` comments for humans.
#   - permissions: contents: read at the workflow level; no job
#     elevates. No secrets referenced.
#   - Concurrency: workflow-scoped; cancel-in-progress only for PR
#     events (main pushes queue so every main commit gets a record).
#   - fail-fast: false so one OS failure doesn't hide another.
#   - NuGet cache keyed on Directory.Packages.props hash; runner.os
#     prefixed so macOS + Linux caches don't collide.
#   - Three-way parity per GOVERNANCE §24: dev laptop, CI runner,
#     and (future) devcontainer all bootstrap via the same
#     `tools/setup/install.sh`. This makes TLC + Alloy jars, Lean/
#     elan, mise-pinned dotnet + python, and dotnet-tools available
#     on CI without a separate YAML-maintained list — the manifests
#     under `tools/setup/manifests/` are the single source of truth.
#   - `mise trust` policy: `.mise.toml` trust is ceremony that
#     becomes meaningful once branch-protection-on-main is live
#     (reviewer gate before any change lands). Until that flips,
#     `.mise.toml` changes get `threat-model-critic` reviewer-floor
#     cover per GOVERNANCE §20. See docs/security/V1-SECURITY-GOALS.md.

name: gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache .NET SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dotnet
          key: dotnet-${{ runner.os }}-${{ hashFiles('global.json', 'tools/setup/common/dotnet.sh') }}

      - name: Cache mise runtimes (python only post round 32)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/mise
            ~/.cache/mise
          key: mise-${{ runner.os }}-${{ hashFiles('.mise.toml') }}

      - name: Cache elan (Lean 4 toolchain)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('tools/setup/common/elan.sh') }}

      - name: Cache verifier jars (TLC + Alloy)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            tools/tla
            tools/alloy
          # Manifest is the single source of truth — cache busts when
          # either URL or (future) SHA changes.
          key: verifiers-${{ runner.os }}-${{ hashFiles('tools/setup/manifests/verifiers') }}

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          # Keys on `Directory.Packages.props`. The `packages.lock.json`
          # ideal is round-33 Track B. No `restore-keys` — partial hit
          # would restore against different resolved versions.
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        # Single source of truth for toolchain state. Installs:
        # .NET SDK (per global.json, via Microsoft's dotnet-install.sh
        # — round-32 refactor out of mise), python (mise-pinned),
        # elan (Lean manager), dotnet global tools, TLC + Alloy
        # verifier jars. shellenv.sh emits BASH_ENV into $GITHUB_ENV
        # so every subsequent bash `run:` step auto-sources the
        # managed shellenv file (SQLSharp-proven pattern).
        run: ./tools/setup/install.sh

      - name: Build (0 Warning(s) / 0 Error(s) required)
        # BASH_ENV (set by shellenv.sh during the install step) has
        # already pointed this shell at the managed shellenv file;
        # no explicit source needed.
        run: dotnet build Zeta.sln -c Release

      - name: Test
        run: dotnet test Zeta.sln -c Release --no-build --verbosity normal

  lint:
    # Semgrep runs every rule in `.semgrep.yml` — 14+ custom rules
    # codifying F# / security / supply-chain anti-patterns. Single OS
    # since rules are OS-independent; saves minutes.
    #
    # Round 30 posture fix: before this job existed, 14 rules were
    # codified but 0 gated the build. See docs/security/
    # THREAT-MODEL.md "mitigation validation" section + round-30
    # elevation design (docs/research/threat-model-elevation.md).
    name: lint (semgrep)
    timeout-minutes: 10
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        # --error exits non-zero if any rule matches. The 14 rules in
        # `.semgrep.yml` are ERROR or WARNING; --error flips any match
        # into a hard-fail regardless of declared severity. Rationale:
        # under nation-state posture per round-30 elevation, a lint
        # rule without a gate isn't a control.
        run: semgrep --config .semgrep.yml --error --metrics=off

  lint-shell:
    # Shellcheck on every bash script under tools/setup/ + tools/.
    # Round 33 static-analysis expansion (Aaron: "as much static
    # analysis as possible, match or surpass SQLSharp + scratch").
    # See openspec/specs/static-analysis/profiles/shell.md.
    name: lint (shellcheck)
    timeout-minutes: 5
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run shellcheck
        # shellcheck ships pre-installed on ubuntu-22.04 runners.
        # Scope: Zeta's own scripts under `tools/setup/` only —
        # `tools/lean4/.lake/packages/**` is Lean/Mathlib vendored
        # code not governed by Zeta standards.
        # Format: -f gcc for file:line:col:msg output parseable by
        # IDEs. Severity floor: style (catches everything including
        # style warnings; we can relax to warning if noise is high).
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find tools -name "*.sh" -type f \
              -not -path "tools/lean4/.lake/*" \
              | sort
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shell scripts found under tools/; skipping"
            exit 0
          fi
          echo "shellcheck targets:"
          printf '  %s\n' "${files[@]}"
          shellcheck --format=gcc --severity=style "${files[@]}"

  lint-workflows:
    # actionlint catches .github/workflows/*.yml bugs: unknown
    # context refs, invalid runner labels, shellcheck-style warnings
    # on run: blocks, wrong action syntax. Round 33 static-analysis
    # expansion. See openspec/specs/static-analysis/profiles/
    # github-actions.md.
    name: lint (actionlint)
    timeout-minutes: 5
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download actionlint (pinned)
        # Download directly from the rhysd/actionlint release; SHA
        # pin in the install script below. Avoids a third-party
        # action just to install a linter.
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.7"
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash) "${ACTIONLINT_VERSION}"
          ./actionlint --version

      - name: Run actionlint
        run: ./actionlint -color

  lint-no-empty-dirs:
    # Fail if a committed directory has no files — almost always a
    # forgotten artefact (an agent-created skill folder without a
    # SKILL.md, a research folder with no report). Born round 35 after
    # Aaron: "we need a build script that will fail the build if it
    # detects an empty folder". Script under tools/lint/ respects
    # .gitignore and an explicit allowlist at
    # tools/lint/no-empty-dirs.allowlist. Upstream mirrors under
    # references/upstreams/** are excluded by the script itself.
    # No untrusted input used in run: — only a fixed repo path.
    name: lint (no empty dirs)
    timeout-minutes: 3
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run no-empty-dirs
        run: tools/lint/no-empty-dirs.sh

  lint-markdown:
    # markdownlint-cli2 on every .md file outside the ignore list in
    # .markdownlint-cli2.jsonc. Round 33 static-analysis expansion
    # (docs + specs + skills are a huge surface; drift is easy).
    # See openspec/specs/static-analysis/profiles/markdown.md.
    name: lint (markdownlint)
    timeout-minutes: 5
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        # Pinned Node is enough for markdownlint-cli2; no bun needed.
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: '22'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.18.1

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md"
