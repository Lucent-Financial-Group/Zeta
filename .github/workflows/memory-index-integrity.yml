name: memory-index-integrity

# Enforces frontmatter completeness on memory/*.md files (B-0423).
#
# Architectural fix: replaced the synchronous MEMORY.md paired-edit
# gate (NSA-001 prevention) with a frontmatter-completeness gate.
# Memory files commit without a same-PR MEMORY.md update (heap-state-
# acceptable). MEMORY.md is kept current by the autonomous-loop tick
# running `tools/memory/reindex-memory-md.ts` on cadence.
# See: docs/backlog/P1/B-0423-memory-md-serialization-point-2026-05-12.md
#
# Previous behavior: enforced same-commit-or-same-PR pairing between
# memory files and MEMORY.md (NSA-001 prevention). That architecture
# was a serialization point — removed by B-0423.
#
# Safe-pattern compliance (per FACTORY-HYGIENE row #43):
#   - SHA-pinned action versions (actions/checkout@de0fac2...)
#   - Explicit `permissions:` minimum
#   - Only first-party trusted context (github.event.*.sha, github.sha,
#     github.event.before). No user-authored text is referenced anywhere.
#   - Values passed via env: and quoted in shell.
#   - Concurrency group + cancel-in-progress: false.
#   - runs-on: ubuntu-24.04 pinned.
#
# Scope — triggers the check:
#   memory/*.md  (top-level session memories,
#                 excluding memory/README.md + memory/MEMORY.md +
#                 memory/CURRENT-*.md)
# Scope — excluded:
#   memory/persona/**     (per-persona notebooks / journals)
#   memory/README.md      (convention doc)
#   memory/MEMORY.md      (the index itself — generated by reindexer)
#   memory/CURRENT-*.md   (persona fast-path files)
#   Deletions             (covered by FACTORY-HYGIENE row #25
#                          pointer-integrity audit)
#
# See:
#   - docs/backlog/P1/B-0423-memory-md-serialization-point-2026-05-12.md
#   - tools/memory/reindex-memory-md.ts (the cadence reindexer)
#   - docs/hygiene-history/nsa-test-history.md (NSA-001 — historical)

on:
  pull_request:
    paths:
      - "memory/**"
  push:
    branches: [main]
    paths:
      - "memory/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: memory-index-integrity-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: check memory file frontmatter completeness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: detect memory changes and validate frontmatter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "no base SHA (first push or force-push); skipping check" >&2
            exit 0
          fi

          changed=$(git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- "memory/" || true)

          if [[ -z "$changed" ]]; then
            echo "no memory/ add-or-modify changes in range; skipping check" >&2
            exit 0
          fi

          echo "changed memory files in range:" >&2
          printf '  %s\n' "$changed" >&2

          triggers=""

          while IFS= read -r f; do
            case "$f" in
              memory/MEMORY.md)
                :
                ;;
              memory/README.md)
                :
                ;;
              memory/CURRENT-*.md)
                :
                ;;
              memory/persona/*)
                # Note: bash case `*` matches slashes (unlike
                # pathname globbing). So this single pattern
                # correctly covers ALL nested persona notebook
                # paths including memory/persona/<name>/NOTEBOOK.md.
                :
                ;;
              memory/*.md)
                triggers+="$f"$'\n'
                ;;
              *)
                :
                ;;
            esac
          done <<< "$changed"

          if [[ -z "$triggers" ]]; then
            echo "no trigger-qualifying memory/*.md changes; skipping check" >&2
            exit 0
          fi

          echo "trigger-qualifying memory changes:" >&2
          printf '  %s' "$triggers" >&2
          echo "" >&2

          # Gate: frontmatter completeness.
          # Each memory file must have all four required fields in its
          # frontmatter block. The reindexer requires these fields to
          # index the file into MEMORY.md on cadence (B-0423).
          missing_fields=false

          while IFS= read -r f; do
            [[ -z "$f" ]] && continue

            # Extract only the frontmatter block (lines between the
            # first pair of --- delimiters, exclusive).
            frontmatter=$(awk '/^---$/{if (++n==2) exit; next} n==1' "$f")

            for field in name description type created; do
              if ! echo "$frontmatter" | grep -qE "^${field}:"; then
                echo "MISSING frontmatter field '${field}' in: $f" >&2
                missing_fields=true
              fi
            done
          done <<< "$triggers"

          if $missing_fields; then
            echo "" >&2
            echo "One or more memory files are missing required frontmatter fields." >&2
            echo "" >&2
            echo "Required fields: name, description, type, created" >&2
            echo "" >&2
            echo "The reindexer (tools/memory/reindex-memory-md.ts) requires these" >&2
            echo "fields to index the file into MEMORY.md on cadence. Fix the" >&2
            echo "frontmatter before merging." >&2
            echo "" >&2
            echo "Note: a synchronous MEMORY.md paired-edit is NO LONGER required" >&2
            echo "(heap-state-acceptable per B-0423). MEMORY.md is kept current" >&2
            echo "by the autonomous-loop tick running the reindexer." >&2
            echo "" >&2
            echo "See: docs/backlog/P1/B-0423-memory-md-serialization-point-2026-05-12.md" >&2
            exit 1
          fi

          echo "all trigger-qualifying memory files have complete frontmatter — OK" >&2
