name: git-hotspot-cadence

# Weekly cadenced detector for git hotspots — files touched by many
# commits in a short window, which cause merge-cascade DIRTY-flips.
# Runs the audit-git-hotspots.ts detector and uploads the resulting
# markdown report as a workflow artifact. Per B-0067 phase 2 (cadence
# wiring); phase 1 (the script itself) is already on disk at
# tools/hygiene/audit-git-hotspots.ts.
#
# Why weekly: hotspot patterns surface across multiple PRs, not
# per-PR — a daily report would show flapping noise. Weekly is the
# right cadence to catch genuine emerging hotspots without
# generating per-day distractions. Same cadence as
# budget-snapshot-cadence.yml.
#
# Why off-the-hour Sundays: GHA cron thundering-herd avoidance per
# .github/workflows/budget-snapshot-cadence.yml convention.
#
# What this workflow does NOT do (per B-0067 explicit scope):
#   - Does NOT auto-file backlog rows for new hotspots — that is
#     phase 3 triage routing, a per-finding judgment call.
#   - Does NOT auto-migrate. Each detected hotspot is a per-hotspot
#     decision.
#   - Does NOT enforce a hard cap. The script prints a markdown
#     ranking; the maintainer / future-Otto reviews the artifact.
#
# Composes with tools/hygiene/audit-git-hotspots.ts (the detector),
# docs/backlog/P1/B-0067 (the row), B-0061 (BACKLOG.md migration),
# B-0066 (MEMORY.md migration).
#
# Safe-pattern compliance: SHA-pinned actions, explicit minimum
# permissions, no user-authored context interpolated into run blocks,
# concurrency group, pinned runs-on, path-filter for self-test trigger.
# This workflow uses only github.run_id and github.ref in template
# expressions — no untrusted user-authored inputs.

on:
  schedule:
    # Weekly Sundays 16:43 UTC — off-the-hour weekend slot. Adjacent
    # to but not colliding with budget-snapshot-cadence (Sundays
    # 16:23 UTC).
    - cron: "43 16 * * 0"
  workflow_dispatch: {}
  pull_request:
    paths:
      - "tools/hygiene/audit-git-hotspots.ts"
      - ".github/workflows/git-hotspot-cadence.yml"

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: git-hotspot-cadence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hotspot-audit:
    name: detect git hotspots (weekly)
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need full history so the script can analyze the touch
          # window (default 60 days). Without fetch-depth: 0 the
          # detector only sees the most recent commit.
          fetch-depth: 0

      - name: Install toolchain via three-way-parity script (GOVERNANCE §24)
        run: ./tools/setup/install.sh

      - name: Run hotspot detector
        run: |
          mkdir -p hotspot-reports
          bun tools/hygiene/audit-git-hotspots.ts \
            --window 60d \
            --top 30 \
            --report hotspot-reports/git-hotspots.md

      - name: Upload hotspot report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: git-hotspot-report-${{ github.run_id }}
          path: hotspot-reports/
          if-no-files-found: warn
          retention-days: 90
