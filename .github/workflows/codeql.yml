# CodeQL semantic static analysis — Zeta-tuned (round 34).
#
# Produces code-scanning alerts under Security -> Code scanning.
# Triaged by security-researcher (Mateo) per GOVERNANCE §22;
# runtime alert ops by security-operations-engineer (Nazar).
# Satisfies SDL practice #9 (Perform Static Analysis Security
# Testing) for the semantic / taint-flow slice that Semgrep
# (syntactic) and the F# compiler (type-level) do not cover.
#
# WHAT THIS DOES DIFFERENTLY FROM THE GITHUB DEFAULT
# ----------------------------------------------------
#   1. Dropped the `java-kotlin` matrix cell. Zeta is F#/C#
#      on .NET 10; there is no Java / Kotlin source.
#   2. `csharp` leg uses `build-mode: manual` with
#      `./tools/setup/install.sh` + `dotnet build Zeta.sln`.
#      The GitHub default was `build-mode: none` (source-only),
#      which for an F#-first repo via the C# pack means no
#      MSIL and no F# symbolic info - effectively a no-op.
#      Manual mode produces a real database against compiled
#      IL, which catches CLR-level bugs (null deref, unsafe
#      reflection, SQLi in interop, path traversal).
#   3. Toolchain install goes through `tools/setup/install.sh`,
#      not `actions/setup-dotnet`, so CodeQL / dev laptops /
#      CI / devcontainers all converge on the same .NET SDK
#      (GOVERNANCE §24 three-way-parity invariant).
#   4. Query packs scale with the trigger:
#        PR / push -> security-extended (fast, high-confidence)
#        schedule  -> security-extended + security-and-quality
#      Running the full suite on every PR would slow feedback
#      and explode the alert queue.
#   5. A config file (.github/codeql/codeql-config.yml) carries
#      paths-ignore for vendored upstreams, bench harness, and
#      external-tool trees where any C# is incidental.
#   6. `concurrency: cancel-in-progress` cuts stale runs on
#      force-push; 30-minute timeout caps the CodeQL DB-build
#      tail which is a known flaky source.
#   7. `path-gate` job runs before analyze. It checks whether
#      any code-scanned paths changed; if not (pure docs /
#      memory / .claude PR), it uploads a minimal
#      no-findings SARIF per language (one per analyze-matrix
#      category: `/language:actions/` and `/language:csharp/`)
#      to the code-scanning service and the `analyze` matrix
#      is skipped. This keeps the repository-level
#      `code_scanning` ruleset rule ("Require code scanning
#      results") satisfied on every PR — docs-only PRs no
#      longer NEUTRAL the aggregated `CodeQL` status check,
#      which the rule interprets as "no results" and blocks
#      on. Code-touching PRs still run the full analysis as
#      before.
#
#      Fork-PR guard: external-contributor PRs get
#      downgraded `GITHUB_TOKEN` permissions, so the
#      synthetic SARIF upload (needs `security-events:
#      write`) would 403 and leave the required check
#      unsatisfied. The decide step forces `code_changed=true`
#      on fork PRs so they fall through to full `analyze`
#      instead of the short-circuit; CodeQL's analyze handles
#      fork-PR permissions via its own fallback path.
#
# SECURITY NOTE on `${{ ... }}` expressions
# ------------------------------------------
# Every expansion in this file reads from trusted contexts only:
# `github.event_name`, `github.workflow`, `github.ref`,
# `runner.os`, `matrix.*`, `hashFiles(...)`. No attacker-
# controlled fields (`github.event.issue.*`, `github.event.pull_
# request.title`, `github.head_ref`, commit author fields) are
# interpolated into `run:` blocks. Injection surface: nil.
#
# LANDING TRACE
# -------------
#   - .claude/skills/codeql-expert/SKILL.md  §Round-34 drift list
#   - docs/TECH-RADAR.md                     CodeQL row (Trial)
#   - docs/BACKLOG.md                        CodeQL entry [~]

name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
  schedule:
    # Weekly sweep - Tuesday 06:43 UTC. Cheaper than a full
    # suite on every push; louder than leaving gaps for a week
    # of landed PRs to go un-swept with the heavier query pack.
    - cron: '43 6 * * 2'

# Top-level token permissions — least-privilege default per
# Scorecard TokenPermissionsID. Per-job blocks below escalate
# to specific scopes only where needed.
permissions:
  contents: read

concurrency:
  # PR force-push supersedes the previous run. Schedule runs
  # carry a distinct ref (`refs/heads/main` on cron) so they
  # don't cancel each other.
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast pre-check: decide whether any code-scanned paths
  # actually changed in this PR / merge-group. On pure docs /
  # memory / .claude-only PRs we short-circuit to uploading a
  # minimal no-findings SARIF so the `code_scanning` ruleset
  # rule sees "results" and does not block on NEUTRAL.
  #
  # Push and schedule events always fall through to the full
  # analyze matrix - those runs establish the baseline for the
  # default branch.
  path-gate:
    name: Path gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    outputs:
      code_changed: ${{ steps.decide.outputs.code_changed }}
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Decide whether code paths changed
        id: decide
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MG_BASE: ${{ github.event.merge_group.base_sha }}
          MG_HEAD: ${{ github.event.merge_group.head_sha }}
          # Fork-PR detection: on PRs from forks, GITHUB_TOKEN is
          # downgraded to read-only for security-events, so the
          # synthetic empty-SARIF upload would 403 and leave the
          # required check unsatisfied. Force full-analysis path
          # on fork PRs so they don't become unmergeable; CodeQL
          # analyze handles fork-PR permissions via its own
          # fallback. Same-repo PRs use "" == "" (the head repo
          # is the base repo).
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Safe default: when unsure, run full analysis.
          decide_fallback_true() {
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # push and schedule always run full analysis.
          if [ "${GH_EVENT}" = "push" ] || [ "${GH_EVENT}" = "schedule" ]; then
            decide_fallback_true
          fi
          # Fork-PR guard: skip the short-circuit on external
          # contributor PRs (see HEAD_REPO comment above).
          if [ "${GH_EVENT}" = "pull_request" ] && [ -n "${HEAD_REPO}" ] && [ "${HEAD_REPO}" != "${BASE_REPO}" ]; then
            decide_fallback_true
          fi
          if [ "${GH_EVENT}" = "pull_request" ]; then
            base="${BASE_SHA}"; head="${HEAD_SHA}"
          else
            base="${MG_BASE}"; head="${MG_HEAD}"
          fi
          if [ -z "${base}" ] || [ -z "${head}" ]; then
            decide_fallback_true
          fi
          # Ensure base ref is in history (shallow fetches may miss it).
          git cat-file -e "${base}^{commit}" 2>/dev/null || {
            git fetch --no-tags --depth=200 origin "${base}" 2>/dev/null || true
          }
          if ! changed=$(git diff --name-only "${base}...${head}" 2>/dev/null); then
            decide_fallback_true
          fi
          # Code-scanned paths: C#/F# sources, project files,
          # build props, the GitHub Actions workflows that
          # CodeQL's `actions` language leg covers, the
          # CodeQL workflow/config themselves (a change to
          # either MUST rerun the real analysis), the
          # toolchain install script (affects the csharp build),
          # plus Python and JavaScript/TypeScript sources for
          # the `python` and `javascript-typescript` analyze
          # legs.
          #
          # Note: `case` pattern `*` matches across `/` in bash,
          # so `src/*` covers any depth under `src/`.
          code_changed=false
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            case "${f}" in
              # `tools/*` covers `tools/setup/*`, `tools/budget/*`,
              # etc. — `*` after the slash matches across slashes
              # in case patterns. Earlier branches kept a separate
              # `tools/setup/*` line; collapsed here per shellcheck
              # SC2222 (later pattern shadowed by earlier one).
              src/*|test/*|tools/*) code_changed=true ;;
              *.cs|*.fs|*.fsproj|*.csproj|*.sln) code_changed=true ;;
              *.py|pyproject.toml|requirements*.txt) code_changed=true ;;
              *.js|*.jsx|*.ts|*.tsx|*.mjs|*.cjs) code_changed=true ;;
              package.json|package-lock.json|tsconfig*.json) code_changed=true ;;
              Directory.Build.props|Directory.Packages.props) code_changed=true ;;
              .github/workflows/*|.github/codeql/*) code_changed=true ;;
            esac
            [ "${code_changed}" = "true" ] && break
          done <<< "${changed}"
          echo "code_changed=${code_changed}" >> "$GITHUB_OUTPUT"

      # Docs-only branch: synthesise a minimal empty SARIF per
      # language and upload each under the matching analyze-job
      # category (/language:actions/, /language:csharp/,
      # /language:python/, /language:javascript-typescript/) so
      # GitHub code scanning records "analysis ran, no new
      # alerts" (SUCCESS aggregate check) rather than NEUTRAL.
      # Categories must match the `analyze` matrix categories or
      # the code-scanning service treats them as unrelated
      # configurations. The `category:` action-param overrides
      # whatever `automationDetails.id` is in the SARIF, so the
      # upload steps below set it explicitly per language. The
      # `lang` loop must include every category the `analyze`
      # matrix covers — otherwise the per-language code-scanning
      # checks for the missing legs go NEUTRAL on docs-only PRs
      # and trip the `code_quality` ruleset rule.
      - name: Emit no-findings SARIF (docs-only PRs)
        if: steps.decide.outputs.code_changed != 'true'
        env:
          HEAD_SHA_ENV: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p sarif
          for lang in actions csharp python javascript-typescript; do
            cat > "sarif/empty-${lang}.sarif" <<SARIF
          {
            "version": "2.1.0",
            "\$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CodeQL",
                    "semanticVersion": "0.0.0",
                    "informationUri": "https://codeql.github.com/",
                    "rules": []
                  }
                },
                "results": [],
                "automationDetails": {
                  "id": "/language:${lang}/"
                },
                "versionControlProvenance": [
                  {
                    "repositoryUri": "https://github.com/${GITHUB_REPOSITORY}",
                    "revisionId": "${HEAD_SHA_ENV}",
                    "branch": "${GITHUB_REF_NAME}"
                  }
                ]
              }
            ]
          }
          SARIF
          done

      # One upload step per language; each sets `category:` to
      # match the analyze-job category for that language. Split
      # (rather than a single directory upload) so the `category:`
      # action-param -- which overrides SARIF automationDetails --
      # can differ per file.
      - name: Upload no-findings SARIF (actions)
        if: steps.decide.outputs.code_changed != 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: sarif/empty-actions.sarif
          category: "/language:actions"

      - name: Upload no-findings SARIF (csharp)
        if: steps.decide.outputs.code_changed != 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: sarif/empty-csharp.sarif
          category: "/language:csharp"

      - name: Upload no-findings SARIF (python)
        if: steps.decide.outputs.code_changed != 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: sarif/empty-python.sarif
          category: "/language:python"

      - name: Upload no-findings SARIF (javascript-typescript)
        if: steps.decide.outputs.code_changed != 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: sarif/empty-javascript-typescript.sarif
          category: "/language:javascript-typescript"

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: path-gate
    if: needs.path-gate.outputs.code_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      security-events: write   # upload SARIF
      packages: read           # fetch private CodeQL packs (future)
      actions: read            # required by codeql-action
      contents: read           # checkout

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: manual
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ---- Toolchain (csharp leg only) -----------------------
      # Mirrors gate.yml discipline: one install script, three
      # consumers (dev laptop / CI / devcontainer). We do NOT
      # reach for actions/setup-dotnet; doing so would fork CI
      # from the canonical install path per GOVERNANCE §24.

      - name: Cache NuGet
        if: matrix.language == 'csharp'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          # Keys on Directory.Packages.props - same as gate.yml.
          # No restore-keys: a partial hit on a different lock
          # restores against different resolved versions, which
          # would drift the CodeQL database from what we ship.
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install toolchain (three-way-parity script)
        if: matrix.language == 'csharp'
        run: ./tools/setup/install.sh

      # ---- CodeQL init + query selection ---------------------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          # PR / push: security-extended only (fast, high-
          # confidence, security-only).
          # Schedule: add security-and-quality on top for
          # breadth. The expression below resolves to the
          # comma-separated pack list CodeQL's init action
          # expects.
          queries: ${{ (github.event_name == 'schedule') && 'security-extended,security-and-quality' || 'security-extended' }}

      # ---- Manual build for csharp ---------------------------
      # BASH_ENV (emitted by tools/setup/shellenv.sh during the
      # install step) has already pointed this shell at the
      # managed shellenv file; no explicit source needed.
      #
      # TreatWarningsAsErrors stays ON per Directory.Build.props.
      # We do not relax it just to get CodeQL past a warning -
      # a warning is a build break.

      - name: Build (csharp - for CodeQL DB extraction)
        if: matrix.build-mode == 'manual'
        run: dotnet build Zeta.sln -c Release

      # ---- Analyze + upload SARIF ----------------------------

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"
