# CodeQL semantic static analysis — Zeta-tuned (round 34).
#
# Produces code-scanning alerts under Security -> Code scanning.
# Triaged by security-researcher (Mateo) per GOVERNANCE §22;
# runtime alert ops by security-operations-engineer (Nazar).
# Satisfies SDL practice #9 (Perform Static Analysis Security
# Testing) for the semantic / taint-flow slice that Semgrep
# (syntactic) and the F# compiler (type-level) do not cover.
#
# WHAT THIS DOES DIFFERENTLY FROM THE GITHUB DEFAULT
# ----------------------------------------------------
#   1. `java-kotlin` matrix cell kept (was previously dropped
#      based on the wrong assumption "no Java/Kotlin source").
#      Zeta is primarily F#/C# on .NET 10 but
#      `tools/alloy/AlloyRunner.java` is first-party Java — a
#      headless JVM driver that runs `.als` Alloy specs from the
#      formal-verification surface. Java is a managed dependency
#      pinned via `.mise.toml` (Java 26, round-34 migration off
#      brew/apt onto mise) and installed by `tools/setup/install.sh`
#      on dev laptops, devcontainers, and CI runners. Treating
#      it as scannable code is consistent with how every other
#      managed runtime in the repo is treated; pretending
#      otherwise gates LFG PRs (empirical 2026-04-28 LFG #661 —
#      umbrella `CodeQL` check NEUTRAL with verbatim summary
#      "1 configuration present on `refs/heads/main` was not
#      found: codeql.yml /language:java-kotlin", which the
#      `code_quality:severity=all` ruleset rule reads as
#      "results pending"). Detection + mechanism captured in
#      `memory/feedback_codeql_umbrella_neutral_vs_per_language_detection_pattern_aaron_2026_04_28.md`.
#   2. `csharp` leg uses `build-mode: manual` with
#      `./tools/setup/install.sh` + `dotnet build Zeta.sln`.
#      The GitHub default was `build-mode: none` (source-only),
#      which for an F#-first repo via the C# pack means no
#      MSIL and no F# symbolic info - effectively a no-op.
#      Manual mode produces a real database against compiled
#      IL, which catches CLR-level bugs (null deref, unsafe
#      reflection, SQLi in interop, path traversal).
#   3. Toolchain install goes through `tools/setup/install.sh`,
#      not `actions/setup-dotnet`, so CodeQL / dev laptops /
#      CI / devcontainers all converge on the same .NET SDK
#      (GOVERNANCE §24 three-way-parity invariant).
#   4. Query packs scale with the trigger:
#        PR / push -> security-extended (fast, high-confidence)
#        schedule  -> security-extended + security-and-quality
#      Running the full suite on every PR would slow feedback
#      and explode the alert queue.
#   5. A config file (.github/codeql/codeql-config.yml) carries
#      paths-ignore for vendored upstreams, bench harness, and
#      external-tool trees where any C# is incidental.
#   6. `concurrency: cancel-in-progress` cuts stale runs on
#      force-push; 30-minute timeout caps the CodeQL DB-build
#      tail which is a known flaky source.
#   7. `path-gate` job runs before analyze. It checks whether
#      any code-scanned paths changed; if not (pure docs /
#      memory / .claude PR), it uploads a minimal
#      no-findings SARIF per language (one per analyze-matrix
#      category: `/language:actions/` and `/language:csharp/`)
#      to the code-scanning service and the `analyze` matrix
#      is skipped. This keeps the repository-level
#      `code_scanning` ruleset rule ("Require code scanning
#      results") satisfied on every PR — docs-only PRs no
#      longer NEUTRAL the aggregated `CodeQL` status check,
#      which the rule interprets as "no results" and blocks
#      on. Code-touching PRs still run the full analysis as
#      before.
#
#      Fork-PR guard: external-contributor PRs get
#      downgraded `GITHUB_TOKEN` permissions, so the
#      synthetic SARIF upload (needs `security-events:
#      write`) would 403 and leave the required check
#      unsatisfied. The decide step forces `code_changed=true`
#      on fork PRs so they fall through to full `analyze`
#      instead of the short-circuit; CodeQL's analyze handles
#      fork-PR permissions via its own fallback path.
#   8. `analyze` matrix has a per-language source-presence
#      gate (`Detect first-party source`). When a language is
#      in the matrix but has zero first-party source files at
#      this commit (e.g. python after the TS hygiene-port
#      retired the last .py files; future python additions
#      for AI/ML scripts will naturally re-enable full
#      analysis), the job uploads a no-findings SARIF and
#      exits SUCCESS instead of crashing the extractor with
#      "no source code seen during build" (CodeQL exit 32 in
#      the `database finalize` stage). The job ALWAYS starts
#      so workflow-level paths-ignore does not leave required
#      checks PENDING (per reviewer feedback 2026-04-29 on
#      #849: a retired language must not become a permanent
#      gate; structure should self-heal). actions/csharp keep
#      the unconditional path because they are first-party
#      always.
#
#      Replaces the path-gate's unconditional empty-SARIF
#      upload pattern at the per-language level — both
#      survive (path-gate covers the "no code paths changed
#      at all" docs-PR case; the matrix-level gate covers
#      the "some code changed but not in this language" case).
#
# SECURITY NOTE on `${{ ... }}` expressions
# ------------------------------------------
# Every expansion in this file reads from trusted contexts only:
# `github.event_name`, `github.workflow`, `github.ref`,
# `runner.os`, `matrix.*`, `hashFiles(...)`. No attacker-
# controlled fields (`github.event.issue.*`, `github.event.pull_
# request.title`, `github.head_ref`, commit author fields) are
# interpolated into `run:` blocks. Injection surface: nil.
#
# LANDING TRACE
# -------------
#   - .claude/skills/codeql-expert/SKILL.md  §Round-34 drift list
#   - docs/TECH-RADAR.md                     CodeQL row (Trial)
#   - docs/BACKLOG.md                        CodeQL entry [~]

name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
  schedule:
    # Weekly sweep - Tuesday 06:43 UTC. Cheaper than a full
    # suite on every push; louder than leaving gaps for a week
    # of landed PRs to go un-swept with the heavier query pack.
    - cron: '43 6 * * 2'

# Top-level token permissions — least-privilege default per
# Scorecard TokenPermissionsID. Per-job blocks below escalate
# to specific scopes only where needed.
permissions:
  contents: read

concurrency:
  # PR force-push supersedes the previous run. Schedule runs
  # carry a distinct ref (`refs/heads/main` on cron) so they
  # don't cancel each other.
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast pre-check: decide whether any code-scanned paths
  # actually changed in this PR / merge-group. On pure docs /
  # memory / .claude-only PRs we short-circuit to uploading a
  # minimal no-findings SARIF so the `code_scanning` ruleset
  # rule sees "results" and does not block on NEUTRAL.
  #
  # Push and schedule events always fall through to the full
  # analyze matrix - those runs establish the baseline for the
  # default branch.
  path-gate:
    name: Path gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      actions: read
    outputs:
      code_changed: ${{ steps.decide.outputs.code_changed }}
      is_fork_pr: ${{ steps.decide.outputs.is_fork_pr }}
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Decide whether code paths changed
        id: decide
        shell: bash
        env:
          GH_EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MG_BASE: ${{ github.event.merge_group.base_sha }}
          MG_HEAD: ${{ github.event.merge_group.head_sha }}
          # Fork-PR detection: on PRs from forks, GITHUB_TOKEN is
          # downgraded to read-only for security-events, so the
          # synthetic empty-SARIF upload would 403 and leave the
          # required check unsatisfied. Force full-analysis path
          # on fork PRs so they don't become unmergeable; CodeQL
          # analyze handles fork-PR permissions via its own
          # fallback. Same-repo PRs use "" == "" (the head repo
          # is the base repo).
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Default fork-PR flag false; set true if this is an
          # external-contributor PR. Used downstream to gate the
          # baseline-SARIF emit/upload steps off fork PRs whose
          # GITHUB_TOKEN cannot write security-events (would 403).
          is_fork_pr=false
          # Safe default: when unsure, run full analysis.
          decide_fallback_true() {
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "is_fork_pr=${is_fork_pr}" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # push and schedule always run full analysis.
          if [ "${GH_EVENT}" = "push" ] || [ "${GH_EVENT}" = "schedule" ]; then
            decide_fallback_true
          fi
          # Fork-PR guard: skip the short-circuit on external
          # contributor PRs (see HEAD_REPO comment above). Mark
          # is_fork_pr so the baseline-SARIF steps below skip
          # (their upload would 403 on the read-only fork token).
          if [ "${GH_EVENT}" = "pull_request" ] && [ -n "${HEAD_REPO}" ] && [ "${HEAD_REPO}" != "${BASE_REPO}" ]; then
            is_fork_pr=true
            decide_fallback_true
          fi
          if [ "${GH_EVENT}" = "pull_request" ]; then
            base="${BASE_SHA}"; head="${HEAD_SHA}"
          else
            base="${MG_BASE}"; head="${MG_HEAD}"
          fi
          if [ -z "${base}" ] || [ -z "${head}" ]; then
            decide_fallback_true
          fi
          # Ensure base ref is in history (shallow fetches may miss it).
          git cat-file -e "${base}^{commit}" 2>/dev/null || {
            git fetch --no-tags --depth=200 origin "${base}" 2>/dev/null || true
          }
          if ! changed=$(git diff --name-only "${base}...${head}" 2>/dev/null); then
            decide_fallback_true
          fi
          # Code-scanned paths: C#/F# sources, project files,
          # build props, the GitHub Actions workflows that
          # CodeQL's `actions` language leg covers, the
          # CodeQL workflow/config themselves (a change to
          # either MUST rerun the real analysis), the
          # toolchain install script (affects the csharp build),
          # plus Python and JavaScript/TypeScript sources for
          # the `python` and `javascript-typescript` analyze
          # legs.
          #
          # Note: `case` pattern `*` matches across `/` in bash,
          # so `src/*` covers any depth under `src/`.
          code_changed=false
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            case "${f}" in
              # `tools/*` covers `tools/setup/*`, `tools/budget/*`,
              # etc. — `*` after the slash matches across slashes
              # in case patterns. Earlier branches kept a separate
              # `tools/setup/*` line; collapsed here per shellcheck
              # SC2222 (later pattern shadowed by earlier one).
              src/*|tests/*|tools/*) code_changed=true ;;
              *.cs|*.fs|*.fsproj|*.csproj|*.sln) code_changed=true ;;
              # JVM surface: tools/alloy/AlloyRunner.java is the
              # only first-party Java today. CodeQL java-kotlin
              # extractor handles .java + .kt + .scala.
              *.java|*.kt|*.scala) code_changed=true ;;
              *.py|pyproject.toml|requirements*.txt) code_changed=true ;;
              *.js|*.jsx|*.ts|*.tsx|*.mjs|*.cjs) code_changed=true ;;
              package.json|package-lock.json|tsconfig*.json) code_changed=true ;;
              Directory.Build.props|Directory.Packages.props) code_changed=true ;;
              .github/workflows/*|.github/codeql/*) code_changed=true ;;
            esac
            [ "${code_changed}" = "true" ] && break
          done <<< "${changed}"
          echo "code_changed=${code_changed}" >> "$GITHUB_OUTPUT"
          echo "is_fork_pr=${is_fork_pr}" >> "$GITHUB_OUTPUT"

      # Aggregate-CodeQL baseline: synthesise a minimal empty SARIF
      # per language and upload each under the matching analyze-job
      # category (/language:actions/, /language:csharp/,
      # /language:python/, /language:javascript-typescript/) so
      # GitHub code scanning records "analysis ran, no new alerts"
      # (SUCCESS aggregate check) rather than NEUTRAL.
      #
      # Why this runs UNCONDITIONALLY (not gated on docs-only):
      # The aggregate `CodeQL` status check is set when path-gate's
      # SARIF uploads complete, BEFORE the matrix `analyze` jobs
      # finish. If we only emit on docs-only PRs, code-changed PRs
      # leave the aggregate without input → NEUTRAL → trips the
      # `code_quality` ruleset rule even though all per-language
      # `Analyze (X)` checks pass. By emitting empty SARIF
      # unconditionally, the aggregate gets a clean baseline early.
      # The matrix analyses' REAL SARIF is uploaded later under the
      # same `(commit, ref, category, tool)` key and replaces the
      # empty baseline (per GitHub's SARIF-replace-by-key rule),
      # so any real findings still surface as code-scanning alerts.
      # The `code_quality severity:all` rule gates on alerts, not on
      # the aggregate status, so real findings still block merges.
      #
      # Categories must match the `analyze` matrix categories or
      # the code-scanning service treats them as unrelated
      # configurations. The `category:` action-param overrides
      # whatever `automationDetails.id` is in the SARIF, so the
      # upload steps below set it explicitly per language. The
      # `lang` loop must include every category the `analyze`
      # matrix covers.
      - name: Emit no-findings SARIF (aggregate-CodeQL baseline)
        # Skip on fork PRs: their GITHUB_TOKEN cannot write
        # security-events, so the upload steps below would 403
        # and fail the workflow before `analyze` could run. The
        # full `analyze` matrix is forced on fork PRs (see decide
        # step) and uploads via its own pull_request_target /
        # CodeQL-fallback path, so the baseline is unnecessary.
        if: steps.decide.outputs.is_fork_pr != 'true'
        env:
          HEAD_SHA_ENV: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p sarif
          # `java-kotlin` is included even though our `analyze` matrix
          # doesn't cover it: GitHub Advanced Security still expects
          # the category because main's history once carried it (the
          # configuration is sticky per `refs/heads/main`). Without
          # this empty baseline upload, the aggregate `CodeQL` check
          # surfaces "1 configuration not found" and goes NEUTRAL,
          # tripping the `code_quality` ruleset rule. Emitting empty
          # SARIF for `/language:java-kotlin` satisfies the
          # expectation; we have no Java/Kotlin source so empty is
          # also correct.
          for lang in actions csharp python javascript-typescript java-kotlin; do
            cat > "sarif/empty-${lang}.sarif" <<SARIF
          {
            "version": "2.1.0",
            "\$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CodeQL",
                    "semanticVersion": "0.0.0",
                    "informationUri": "https://codeql.github.com/",
                    "rules": []
                  }
                },
                "results": [],
                "automationDetails": {
                  "id": "/language:${lang}/"
                },
                "versionControlProvenance": [
                  {
                    "repositoryUri": "https://github.com/${GITHUB_REPOSITORY}",
                    "revisionId": "${HEAD_SHA_ENV}",
                    "branch": "${GITHUB_REF_NAME}"
                  }
                ]
              }
            ]
          }
          SARIF
          done

      # One upload step per language; each sets `category:` to
      # match the analyze-job category for that language. Split
      # (rather than a single directory upload) so the `category:`
      # action-param -- which overrides SARIF automationDetails --
      # can differ per file.
      - name: Upload no-findings SARIF (actions)
        if: steps.decide.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/empty-actions.sarif
          category: "/language:actions"

      - name: Upload no-findings SARIF (csharp)
        if: steps.decide.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/empty-csharp.sarif
          category: "/language:csharp"

      - name: Upload no-findings SARIF (python)
        if: steps.decide.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/empty-python.sarif
          category: "/language:python"

      - name: Upload no-findings SARIF (javascript-typescript)
        if: steps.decide.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/empty-javascript-typescript.sarif
          category: "/language:javascript-typescript"

      - name: Upload no-findings SARIF (java-kotlin)
        # No Java/Kotlin source in this repo, but main's history
        # carries the configuration; satisfy the sticky expectation.
        if: steps.decide.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/empty-java-kotlin.sarif
          category: "/language:java-kotlin"

  analyze:
    # Cadence note (maintainer 2026-04-27 + follow-up): the matrix
    # `Analyze (X)` legs — especially `Analyze (csharp)` — were
    # the per-PR bottleneck. An attempt to skip the matrix on PRs
    # (keeping path-gate's empty-SARIF baseline as the aggregate
    # signal) hit GitHub's `code_quality severity:all` ruleset
    # rule which expects the per-language `Analyze (X)` status
    # checks to actually appear on the PR — the merge gate kept
    # showing "Code quality results are pending for 4 analyzed
    # languages." Reverted to running the matrix on PR + push +
    # schedule; cadence-fast-revisit deferred. macos-26 build +
    # Windows legs in gate.yml stay on the per-merge cadence
    # because they don't trip the same gate.
    name: Analyze (${{ matrix.language }})
    needs: path-gate
    if: needs.path-gate.outputs.code_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      security-events: write   # upload SARIF
      packages: read           # fetch private CodeQL packs (future)
      actions: read            # required by codeql-action
      contents: read           # checkout

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: manual
          # java-kotlin scans `tools/alloy/AlloyRunner.java` —
          # a single-file JVM driver with no Maven/Gradle build,
          # so `build-mode: none` (CodeQL's source-only pack)
          # produces a real DB. Java 26 is on PATH via mise per
          # tools/setup/install.sh; the GitHub-hosted runner has
          # mise-shimmed Java available after the install step
          # below, but we don't need to invoke `javac` ourselves.
          #
          # JVM language preference (B-0075): Kotlin > Scala >
          # Java. New JVM code lands in Kotlin by default;
          # AlloyRunner.java is grandfathered until its next
          # non-trivial rewrite. The `java-kotlin` extractor
          # scans all three so this matrix cell does not need
          # to change when the preference activates.
          - language: java-kotlin
            build-mode: none
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ---- Per-language source-presence gate -----------------
      # Structural fix for the "no source code seen during build"
      # CodeQL extractor failure when a language is in the matrix
      # but has zero first-party source files at this commit
      # (e.g. python after the TS hygiene-port retired the last
      # .py files; future python additions for AI/ML scripts will
      # naturally re-enable full analysis here).
      #
      # Why this approach (per reviewer feedback 2026-04-29 on
      # #849): workflow-level paths-ignore would leave required
      # checks PENDING and block the PR; removing the language
      # from the matrix loses future re-enablement and risks
      # branch-protection drift if Python scripts return.
      # Instead the job always starts, classifies in-place
      # whether any first-party source exists for this language,
      # and either runs the full extractor pipeline OR uploads
      # a no-findings SARIF and exits SUCCESS. The aggregate
      # `code_quality` ruleset rule sees a real per-language
      # status; the upload step's `category:` action-param
      # matches the analyze category, so GitHub's SARIF
      # replacement logic records it as the clean baseline for
      # that language.
      #
      # Source-presence heuristic mirrors codeql-config.yml's
      # paths-ignore so the gate cannot report has_source=true
      # for files CodeQL will skip anyway. Centralised in
      # `shared_ignored_paths_regex` below.
      #
      # `actions` and `csharp` are first-party always — they keep
      # the unconditional "real analysis" path; gating them would
      # only mask config drift that should surface as failure.
      - name: Detect first-party source for ${{ matrix.language }}
        id: src
        shell: bash
        run: |
          set -euo pipefail
          # `grep -cvE` returns exit 1 when zero lines are selected
          # (the "language fully retired" case we WANT to detect),
          # which trips set -e + pipefail. The `|| true` recovers
          # while preserving the count printed on stdout (always
          # "0" or a positive integer); shellcheck SC2126 prefers
          # `grep -c` over `grep | wc -l`.
          #
          # Keep this regex in sync with .github/codeql/codeql-
          # config.yml `paths-ignore`. If a language source file
          # lives only under one of these paths, CodeQL would
          # skip it during extraction even though we counted it
          # as has_source=true, producing the same "no source
          # code seen during build" failure this gate is meant
          # to prevent. `**/*.generated.cs` and `**/obj/**` /
          # `**/bin/**` from the config are folded in via
          # `(^|.*/)(obj|bin)/`. The .generated.cs glob is csharp-
          # only and irrelevant here (csharp is unconditional).
          #
          # BRIDGE NOT FINAL ARCHITECTURE: this regex is a
          # workflow-local classifier embedded in codeql.yml as
          # the smallest sufficient unblock for the retired-
          # python case. The future canonical classifier should
          # pull this logic into `tools/ci/classify-changed-
          # files.*` with fixtures so CodeQL, docs-substrate,
          # and code gates share one path-universe rather than
          # each growing their own. Tracked via task #306
          # (cadence-fast classifier work) — do not treat the
          # duplicated regex as the permanent design.
          shared_ignored_paths_regex='^(references/upstreams/|bench/|tools/tla/|tools/lean4/)|(^|.*/)(obj|bin)/'
          case "${{ matrix.language }}" in
            python)
              count=$(git ls-files -- '*.py' \
                | grep -cvE "${shared_ignored_paths_regex}" \
                || true)
              ;;
            java-kotlin)
              # tools/alloy/AlloyRunner.java is first-party Java.
              count=$(git ls-files -- '*.java' '*.kt' '*.kts' \
                | grep -cvE "${shared_ignored_paths_regex}" \
                || true)
              ;;
            javascript-typescript)
              # CodeQL's javascript-typescript extractor handles
              # `.mts` (ESM TypeScript) and `.cts` (CJS TypeScript)
              # alongside the .js/.jsx/.ts/.tsx/.mjs/.cjs set. Repos
              # that use `.mts`/`.cts` exclusively as entrypoints
              # would otherwise has_source=false and silently skip
              # real analysis.
              count=$(git ls-files -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' '*.mts' '*.cts' \
                | grep -cvE "${shared_ignored_paths_regex}" \
                || true)
              ;;
            actions|csharp)
              # First-party always. Workflows live under
              # .github/workflows/ (csharp covered by manual
              # build-mode against Zeta.sln); gating these would
              # mask real config drift.
              count=1
              ;;
            *)
              # New languages: default to running full analysis
              # so silent-skip drift is impossible; revisit if
              # the new language wants the gated pattern.
              count=1
              ;;
          esac
          if [ "${count}" -gt 0 ]; then
            echo "has_source=true" >> "$GITHUB_OUTPUT"
            echo "first-party ${{ matrix.language }} source files: ${count}"
          else
            echo "has_source=false" >> "$GITHUB_OUTPUT"
            echo "no first-party ${{ matrix.language }} source files at this commit; uploading no-findings SARIF baseline"
          fi

      # Fork-PR guard mirrors path-gate's emit/upload steps: on
      # PRs from forks the GITHUB_TOKEN is read-only for
      # `security-events`, so the SARIF upload would 403 with
      # `Resource not accessible by integration` and FAIL the
      # exact retired-language case this gate is meant to unblock
      # (review-tool P1 catch on PR #857). On fork PR + no-source, the
      # subsequent init/build/analyze steps are also skipped
      # (gated on `has_source == 'true'`), so the job exits
      # SUCCESS with no SARIF emitted — same posture as path-gate
      # takes on fork PRs.
      - name: Emit no-findings SARIF (no-source baseline)
        if: steps.src.outputs.has_source != 'true' && needs.path-gate.outputs.is_fork_pr != 'true'
        env:
          HEAD_SHA_ENV: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p sarif
          # Minimal SARIF 2.1.0 with empty results; category is
          # set by the upload step's `category:` action-param so
          # automationDetails here is informational.
          cat > "sarif/no-source-${{ matrix.language }}.sarif" <<SARIF
          {
            "version": "2.1.0",
            "\$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CodeQL",
                    "semanticVersion": "0.0.0",
                    "informationUri": "https://codeql.github.com/",
                    "rules": []
                  }
                },
                "results": [],
                "automationDetails": {
                  "id": "/language:${{ matrix.language }}/"
                },
                "versionControlProvenance": [
                  {
                    "repositoryUri": "https://github.com/${GITHUB_REPOSITORY}",
                    "revisionId": "${HEAD_SHA_ENV}",
                    "branch": "${GITHUB_REF_NAME}"
                  }
                ]
              }
            ]
          }
          SARIF

      - name: Upload no-source SARIF
        if: steps.src.outputs.has_source != 'true' && needs.path-gate.outputs.is_fork_pr != 'true'
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: sarif/no-source-${{ matrix.language }}.sarif
          category: "/language:${{ matrix.language }}"

      # ---- Toolchain (csharp leg only) -----------------------
      # Mirrors gate.yml discipline: one install script, three
      # consumers (dev laptop / CI / devcontainer). We do NOT
      # reach for actions/setup-dotnet; doing so would fork CI
      # from the canonical install path per GOVERNANCE §24.
      #
      # All real-analysis steps below are gated on
      # steps.src.outputs.has_source == 'true' so they are
      # skipped on no-source runs (the baseline upload above
      # already satisfies the per-language status check).

      - name: Cache NuGet
        if: matrix.language == 'csharp' && steps.src.outputs.has_source == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          # Keys on Directory.Packages.props - same as gate.yml.
          # No restore-keys: a partial hit on a different lock
          # restores against different resolved versions, which
          # would drift the CodeQL database from what we ship.
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install toolchain (three-way-parity script)
        if: matrix.language == 'csharp' && steps.src.outputs.has_source == 'true'
        run: ./tools/setup/install.sh

      # ---- CodeQL init + query selection ---------------------

      - name: Initialize CodeQL
        if: steps.src.outputs.has_source == 'true'
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml
          # PR / push: security-extended only (fast, high-
          # confidence, security-only).
          # Schedule: add security-and-quality on top for
          # breadth. The expression below resolves to the
          # comma-separated pack list CodeQL's init action
          # expects.
          queries: ${{ (github.event_name == 'schedule') && 'security-extended,security-and-quality' || 'security-extended' }}

      # ---- Manual build for csharp ---------------------------
      # BASH_ENV (emitted by tools/setup/shellenv.sh during the
      # install step) has already pointed this shell at the
      # managed shellenv file; no explicit source needed.
      #
      # TreatWarningsAsErrors stays ON per Directory.Build.props.
      # We do not relax it just to get CodeQL past a warning -
      # a warning is a build break.

      - name: Build (csharp - for CodeQL DB extraction)
        if: matrix.build-mode == 'manual' && steps.src.outputs.has_source == 'true'
        run: dotnet build Zeta.sln -c Release

      # ---- Analyze + upload SARIF ----------------------------

      - name: Perform CodeQL Analysis
        if: steps.src.outputs.has_source == 'true'
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          category: "/language:${{ matrix.language }}"
