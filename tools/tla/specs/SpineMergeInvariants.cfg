\* Bounded model-check parameters. MaxLevel=2 + MaxBatchSize=1 produces
\* the same cascade behavior class as larger configurations (level i+1
\* receives merges from level i with capacity doubling) while keeping
\* TLC's state space tractable on a developer machine.
CONSTANTS MaxLevel = 2 MaxBatchSize = 1
SPECIFICATION Spec
INVARIANT InvCap
INVARIANT InvMass
CONSTRAINT StateBound
CONSTRAINT PendingBound
CHECK_DEADLOCK FALSE
