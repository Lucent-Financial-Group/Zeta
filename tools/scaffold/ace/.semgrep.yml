# Semgrep rules for ace — runs via `semgrep --config .semgrep.yml`
#
# Day-one security rules applied at repo creation (B-0424 Stage 1).
# Pattern: Zeta's proven rule-set generalised to ace on day one
# per ADR 2026-04-22 §"Repo best practices — applied at creation":
# "if Zeta does it, Forge and ace do it."
#
# CI integration: wire `semgrep --config .semgrep.yml --error
# --metrics=off` into the gate workflow. Semgrep version is pinned
# via `pipx:semgrep` in `.mise.toml` — install with `mise install`.
# (`pipx:` is mise's registry prefix; routes through `uv tool install`
# when uv is present in the toolchain, per ADR 2026-04-27.)

rules:

  # ────────────────────────────────────────────────────────────────
  # Rule 1 — GitHub Actions workflow-injection: inline untrusted
  # context on a `run:` line. Primary workflow-injection vector per
  # https://github.blog/security/vulnerability-research/how-to-
  # catch-github-actions-workflow-injections-before-attackers-do/.
  #
  # Matches single-line `run: ... ${{ github.<unsafe-path> }} ...`
  # forms for attacker-controlled contexts (PR title, issue body,
  # branch name, commit message, review body). Multi-line `run: |`
  # blocks are not covered here — use actionlint + shellcheck over
  # extracted script bodies for that class.
  #
  # Fix: bind the value to an `env:` entry on the step and read it
  # as `"$VAR"` in the shell.
  # ────────────────────────────────────────────────────────────────
  - id: gha-untrusted-in-run-line
    patterns:
      - pattern-regex: '(?m)^\s*-?\s*run:.*\$\{\{\s*github\.(head_ref|event\.(issue\.(title|body)|pull_request\.(title|body|head_ref|head\.ref|head\.label)|comment\.body|review\.body|head_commit\.message|commits))'
    paths:
      include:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
    message: >-
      Attacker-controlled `github.event.*` / `github.head_ref` value
      expanded directly into a `run:` shell command — GitHub Actions
      workflow-injection sink. A PR title / issue body / branch name
      containing shell metacharacters will execute on the runner.
      Bind the value to the step's `env:` block and reference it as
      `"$VAR"` in the shell.
    languages: [generic]
    severity: ERROR

  # ────────────────────────────────────────────────────────────────
  # Rule 2 — Invisible Unicode codepoints (BP-10).
  # Zero-width spaces (U+200B–U+200D), word-joiner (U+2060), BOM
  # (U+FEFF), bidi overrides (U+202A–U+202E), isolates (U+2066–
  # U+2069), and tag-characters (U+E0000–U+E007F) are steganographic
  # carriers for hidden instructions — especially dangerous in
  # `.md` and `.yml` files processed by LLMs.
  #
  # External anchors:
  #   Trojan Source (Boucher & Anderson, USENIX 2023, arXiv 2111.00169)
  #   — bidi-override range (U+202A–U+202E); CVE-2021-42574.
  #   Goodside 2024-01-11 — tag-character range (U+E0000–U+E007F)
  #   invisible prompt injection against ChatGPT.
  # ────────────────────────────────────────────────────────────────
  - id: invisible-unicode-in-text
    patterns:
      - pattern-regex: "[\u200B\u200C\u200D\u2060\uFEFF\u202A-\u202E\u2066-\u2069\U000E0000-\U000E007F]"
    paths:
      include:
        - "**/*.md"
        - "**/*.ts"
        - "**/*.yml"
        - "**/*.yaml"
        - "**/*.json"
        - "**/*.toml"
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
    message: >-
      Invisible Unicode codepoint detected. Zero-width spaces, word-
      joiners, bidi overrides, and isolates are steganographic carriers
      for hidden instructions in prompt-bearing documents and workflows.
      If this character is legitimate (rare), justify in a comment;
      otherwise strip it.
    languages: [generic]
    severity: ERROR

  # ────────────────────────────────────────────────────────────────
  # Rule 3 — GitHub Actions third-party action pinned by mutable tag.
  # A tag like `@v4` or `@main` can be rewritten by the action author
  # to point to malicious code on any future push. CVE-2025-30066
  # (tj-actions/changed-files, March 2025) landed on 23,000+ repos
  # via exactly this path.
  #
  # Fix: pin every third-party `uses:` to a full 40-char commit SHA;
  # put the human-readable tag in a trailing `# vX.Y.Z` comment.
  # Example: `uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2`
  #
  # Exempt: reusable workflows in this repo (`uses: ./...`).
  # ────────────────────────────────────────────────────────────────
  - id: gha-action-mutable-tag
    patterns:
      - pattern-regex: '(?m)^\s*-?\s*uses:\s+(?!\.\/)[^\s@#]+@(?:v?\d+(?:\.\d+)*|main|master|develop|latest|HEAD)\s*(?:#.*)?$'
    paths:
      include:
        - ".github/workflows/*.yml"
        - ".github/workflows/*.yaml"
    message: >-
      Third-party GitHub Action pinned by a mutable tag. A tag-rewrite
      attack (CVE-2025-30066, March 2025) landed malicious code on
      23,000+ repos via this vector. Pin by the full 40-char commit SHA;
      put the human-readable version in a trailing `# vX.Y.Z` comment.
    languages: [generic]
    severity: ERROR
